const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "purple",
  "chartStyle": "line"
}/*EDITMODE-END*/;
let tweakState = {...TWEAK_DEFAULTS};
function setTheme(v){tweakState.theme=v;updateTweakBtns('theme-toggle',v==='light'?0:1);window.__setTheme&&window.__setTheme(v);postEdit()}
function setAccent(v){tweakState.accent=v;updateTweakBtns('accent-toggle',['green','purple','orange','rose','blue','teal'].indexOf(v));window.__setAccent&&window.__setAccent(v);postEdit()}
function setChart(v){tweakState.chartStyle=v;updateTweakBtns('chart-toggle',v==='bar'?0:1);window.__setChart&&window.__setChart(v);postEdit()}
function updateTweakBtns(id,activeIdx){const btns=document.getElementById(id).querySelectorAll('button');btns.forEach((b,i)=>b.classList.toggle('on',i===activeIdx))}
function postEdit(){window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweakState},'*')}
window.addEventListener('message',e=>{
  if(e.data?.type==='__activate_edit_mode')document.getElementById('tweaks-panel').classList.add('visible');
  if(e.data?.type==='__deactivate_edit_mode')document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({type:'__edit_mode_available'},'*');
</script>

    ...acc,

// ─── SVG CHARTS ───────────────────────────────────────────────────────────────
function BarChart({ incomes, expenses, labels, T, lineMode = false }) {
  const maxV = Math.max(...incomes, ...expenses);
  const W = 280,H = 100,n = labels.length,bw = Math.floor(W / n),pad = 6;
  if (lineMode) {
    const pts = (arr) => arr.map((v, i) => `${i * (W / (n - 1))},${H - v / maxV * H}`).join(' ');
    return <svg width={W} height={H + 20} style={{ overflow: 'visible' }}>
      {[incomes, expenses].map((arr, di) => {
        const color = di === 0 ? T.success : '#DC2626';
        const points = arr.map((v, i) => ({ x: i * (W / (n - 1)), y: H - v / maxV * H }));
        const d = 'M' + points.map((p) => `${p.x},${p.y}`).join(' L');
        return <g key={di}>
          <polyline points={pts(arr)} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" />
          {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color} />)}
        </g>;
      })}
      {labels.map((l, i) => <text key={i} x={i * (W / (n - 1))} y={H + 16} textAnchor="middle" fontSize="10" fill={T.textSub} fontFamily="DM Sans">{l}</text>)}
    </svg>;
  }
  return <svg width={W} height={H + 20} style={{ overflow: 'visible' }}>
    {labels.map((l, i) => {
      const x = i * bw + pad / 2;const bWidth = bw - pad;
      const ih = incomes[i] / maxV * H;const eh = expenses[i] / maxV * H;
      const hw = Math.floor(bWidth / 2) - 1;
      return <g key={i}>
        <rect x={x} y={H - ih} width={hw} height={ih} rx="2" fill={T.success} opacity=".75" />
        <rect x={x + hw + 2} y={H - eh} width={hw} height={eh} rx="2" fill="#DC2626" opacity=".65" />
        <text x={x + bWidth / 2} y={H + 16} textAnchor="middle" fontSize="10" fill={T.textSub} fontFamily="DM Sans">{l}</text>
      </g>;
    })}
  </svg>;
}

function DonutChart({ cats, T }) {
  const R = 54,r = 32,cx = 60,cy = 60;
  let cur = 0;
  const slices = cats.map((c) => {
    const pct = c.pct / 100,start = cur,end = cur + pct;cur = end;
    const s = start * 2 * Math.PI - Math.PI / 2;const e = end * 2 * Math.PI - Math.PI / 2;
    const x1 = cx + R * Math.cos(s),y1 = cy + R * Math.sin(s);
    const x2 = cx + R * Math.cos(e),y2 = cy + R * Math.sin(e);
    const lf = pct > .5 ? 1 : 0;
    const ix1 = cx + r * Math.cos(s),iy1 = cy + r * Math.sin(s);
    const ix2 = cx + r * Math.cos(e),iy2 = cy + r * Math.sin(e);
    return { d: `M${x1} ${y1} A${R} ${R} 0 ${lf} 1 ${x2} ${y2} L${ix2} ${iy2} A${r} ${r} 0 ${lf} 0 ${ix1} ${iy1}Z`, color: c.color };
  });
  return <svg width="120" height="120">
    {slices.map((s, i) => <path key={i} d={s.d} fill={s.color} />)}
    <circle cx={cx} cy={cy} r="26" fill={T.surface} />
    <text x={cx} y={cy - 4} textAnchor="middle" fontSize="12" fontWeight="700" fill={T.text} fontFamily="DM Sans">%</text>
    <text x={cx} y={cy + 10} textAnchor="middle" fontSize="9" fill={T.textSub} fontFamily="DM Sans">dağılım</text>
  </svg>;
}

        </button>

function TransactionsScreen({ T }) {
  const [filter, setFilter] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const filtered = DATA.transactions.filter((t) => {
    if (filter === 'income' && t.amount <= 0) return false;
    if (filter === 'expense' && t.amount >= 0) return false;
    if (search && !t.label.toLowerCase().includes(search.toLowerCase()) && !t.cat.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const total = filtered.reduce((s, t) => s + t.amount, 0);
  return <>
    <div style={{ padding: '12px 16px', background: T.surface, borderBottom: `1px solid ${T.border}`, flexShrink: 0 }}>
      {/* Search */}

      </div>
      {/* Filter pills */}
      <div style={{ display: 'flex', gap: 6 }}>
        {[['all', 'Tümü'], ['income', 'Gelir'], ['expense', 'Gider']].map(([id, lbl]) =>
        <Pill key={id} label={lbl} active={filter === id} onClick={() => setFilter(id)} T={T} />
        )}
        <div style={{ flex: 1, textAlign: 'right', fontFamily: "'DM Mono',monospace", fontSize: 12, color: total >= 0 ? T.success : T.danger, alignSelf: 'center' }}>{total >= 0 ? '+' : '-'}{fmt(Math.abs(total))}</div>
      </div>
    </div>
    <Scroller>
      {filtered.length === 0 ?
      <div style={{ textAlign: 'center', padding: '40px 0', color: T.textSub }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>🔍</div>
          <div style={{ fontWeight: 600 }}>İşlem bulunamadı</div>
          <div style={{ fontSize: 12, marginTop: 4 }}>Farklı bir arama terimi deneyin</div>
        </div> :

      <Card T={T} style={{ padding: '0 4px' }}>
          {filtered.map((t, i) =>
        <div key={t.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '11px 12px', borderBottom: i < filtered.length - 1 ? `1px solid ${T.border}` : 'none' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{ width: 38, height: 38, borderRadius: 11, background: t.catColor + '1A', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  <div style={{ width: 10, height: 10, borderRadius: '50%', background: t.catColor }} />
                </div>
                <div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{t.label}</div>
                  <div style={{ fontSize: 11, color: T.textSub }}>{t.date.slice(0, 5)} · {t.cat}</div>
                </div>
              </div>
              <MonoAmt value={Math.abs(t.amount)} type={t.amount > 0 ? 'income' : 'expense'} size={13} />
            </div>
        )}
        </Card>
      }
    </Scroller>
  </>;

            </div>
            <div style={{ fontSize: 13, color: T.textSub, marginTop: 4 }}>
              {isSaving ? `${fmt(b.target)} hedefin` : `${fmt(b.monthly)} bütçenin`} {isSaving ? '' : 'kullanıldı'}
            </div>
            <div style={{ marginTop: 16, marginBottom: 8 }}>
              <ProgressBar value={val} color={val > 80 ? isSaving ? T.success : T.danger : T.primary} T={T} height={10} />
            </div>
            <div style={{ fontSize: 12, color: T.textSub }}>%{val} {isSaving ? 'tamamlandı' : 'kullanıldı'}</div>
          </div>
        </Card>
        <Card T={T} style={{ padding: '14px 16px' }}>
          <SectionHdr title="Kalan" T={T} />
          <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 22, fontWeight: 500, color: T.success }}>
            {isSaving ? fmt(b.target - b.saved) : fmt(b.monthly - b.spent)}
          </div>
          <div style={{ fontSize: 12, color: T.textSub, marginTop: 4 }}>{isSaving ? 'hedefe kalan' : 'bu ay kalan'}</div>
        </Card>
        <button style={{ width: '100%', padding: '14px 0', borderRadius: 12, background: T.primary, border: 'none', color: '#fff', fontFamily: "'DM Sans',sans-serif", fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>
          {isSaving ? 'Birikim Ekle' : 'Harcama Ekle'}
        </button>
      </Scroller>
    </>;
  }
  return <>
    <div style={{ padding: '12px 16px', background: T.surface, borderBottom: `1px solid ${T.border}`, flexShrink: 0 }}>
      <div style={{ fontSize: 13, color: T.textSub }}>Aktif modüller</div>
    </div>
    <Scroller>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        {DATA.budgets.map((b, i) => {
          const isSaving = b.type === 'saving';
          const val = isSaving ? Math.round(b.saved / b.target * 100) : Math.round(b.spent / b.monthly * 100);
          const alertColor = val > 80 ? isSaving ? T.success : T.danger : T.primary;
          return (
            <button key={i} onClick={() => setSel(i)} style={{ background: T.surface, borderRadius: 14, border: `1px solid ${T.border}`, padding: '14px 14px', textAlign: 'left', cursor: 'pointer', boxShadow: T.cardShadow }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>{b.icon}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: T.text, marginBottom: 4 }}>{b.name}</div>
              <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 13, color: alertColor }}>{isSaving ? `₺${(b.saved / 1000).toFixed(1)}B` : fmt(b.spent)}</div>
              <div style={{ marginTop: 8 }}>
                <ProgressBar value={val} color={alertColor} T={T} height={5} />
              </div>
              <div style={{ fontSize: 10, color: T.textMut, marginTop: 4 }}>%{val}</div>
            </button>);

        })}
      </div>
      <button style={{ width: '100%', padding: '12px 0', borderRadius: 12, background: T.primaryLight, border: `1.5px dashed ${T.primary}`, color: T.primary, fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>+ Yeni Modül Ekle</button>
    </Scroller>
  </>;
}

// ─── AYARLAR ──────────────────────────────────────────────────────────────────
const ACCENT_META = [
  { key: 'purple', label: 'Mor',     color: '#7C3AED' },
  { key: 'green',  label: 'Yeşil',   color: '#059669' },
  { key: 'orange', label: 'Turuncu', color: '#F97316' },
  { key: 'rose',   label: 'Gül',     color: '#E11D48' },
  { key: 'blue',   label: 'Mavi',    color: '#2563EB' },
  { key: 'teal',   label: 'Turkuaz', color: '#0D9488' },
];

function SettingsScreen({ T, isDark, onToggleDark, accent, onAccent }) {
  const sections = [
  { title: 'Hesap', items: [
    { icon: '👤', label: 'Profil Bilgileri', sub: 'Adı güncelle' },
    { icon: '🔒', label: 'Güvenlik', sub: 'PIN, biyometrik' }]
  },
  { title: 'Tercihler', items: [
    { icon: isDark ? '☀️' : '🌙', label: isDark ? 'Açık Mod' : 'Koyu Mod', sub: 'Tema değiştir', onTap: onToggleDark },
    { icon: '🌍', label: 'Dil', sub: 'Türkçe' },
    { icon: '💱', label: 'Para Birimi', sub: 'TL (₺)' }]
  },
  { title: 'Veri', items: [
    { icon: '💾', label: 'Yedekleme', sub: 'Son yedek: bugün' },
    { icon: '📤', label: 'Dışa Aktar', sub: 'CSV, JSON' },
    { icon: '🗑️', label: 'Tüm Veriyi Sil', sub: 'Geri alınamaz', danger: true }]
  },
  { title: 'Hakkında', items: [
    { icon: '📋', label: 'ParaCep', sub: 'Sürüm 1.2.0' },
    { icon: '❓', label: 'Yardım & SSS', sub: '' }]
  }];

  return <Scroller>
    <div style={{ display: 'flex', alignItems: 'center', gap: 14, background: T.surface, borderRadius: 14, padding: '16px 14px', border: `1px solid ${T.border}` }}>
      <div style={{ width: 52, height: 52, borderRadius: '50%', background: T.primaryLight, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>👤</div>
      <div>
        <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>Kullanıcı Adı</div>
        <div style={{ fontSize: 12, color: T.textSub }}>kullanici@email.com</div>
      </div>
    </div>

    {/* Accent colour picker */}
    <div>
      <div style={{ fontSize: 11, fontWeight: 700, color: T.textMut, textTransform: 'uppercase', letterSpacing: '.07em', margin: '4px 4px 6px' }}>Vurgu Rengi</div>
      <Card T={T} style={{ padding: '14px 14px' }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
          {ACCENT_META.map((a) => {
            const active = accent === a.key;
            return (
              <button key={a.key} onClick={() => onAccent(a.key)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
                <div style={{ width: 40, height: 40, borderRadius: '50%', background: a.color, boxShadow: active ? `0 0 0 3px ${T.surface}, 0 0 0 5px ${a.color}` : 'none', transition: 'box-shadow .2s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {active && <svg width="18" height="18" fill="none" stroke="#fff" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>}
                </div>
                <span style={{ fontSize: 10, fontWeight: 600, color: active ? a.color : T.textSub }}>{a.label}</span>
              </button>
            );
          })}
        </div>
      </Card>
    </div>

    {sections.map((sec, si) =>
    <div key={si}>
        <div style={{ fontSize: 11, fontWeight: 700, color: T.textMut, textTransform: 'uppercase', letterSpacing: '.07em', margin: '4px 4px 6px' }}>{sec.title}</div>
        <Card T={T} style={{ padding: '0 4px' }}>
          {sec.items.map((item, ii) =>
        <button key={ii} onClick={item.onTap} style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '13px 12px', borderBottom: ii < sec.items.length - 1 ? `1px solid ${T.border}` : 'none', background: 'none', border: 'none', cursor: item.onTap || item.danger ? 'pointer' : 'default', borderRadius: 0, textAlign: 'left' }}>
              <span style={{ fontSize: 18, width: 28, textAlign: 'center' }}>{item.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600, color: item.danger ? T.danger : T.text }}>{item.label}</div>
                {item.sub && <div style={{ fontSize: 11, color: T.textSub, marginTop: 1 }}>{item.sub}</div>}
              </div>
              {!item.danger && <svg width="16" height="16" fill="none" stroke={T.textMut} strokeWidth="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" /></svg>}
            </button>
        )}
        </Card>
      </div>
    )}
  </Scroller>;
}

// ─── QUICK ADD MODAL ──────────────────────────────────────────────────────────
function QuickAddModal({ onClose, T }) {
  const [type, setType] = React.useState('expense');
  const [amount, setAmount] = React.useState('');
  const [cat, setCat] = React.useState('Mutfak');
  const cats = ['Mutfak', 'Ulaşım', 'Sağlık', 'Giyim', 'Ev Giderleri', 'Gelir', 'Birikim', 'Diğer'];
  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 50, display: 'flex', flexDirection: 'column', justifyContent: 'flex-end' }}>

      <div style={{ position: 'relative', background: T.surface, borderRadius: '22px 22px 0 0', padding: '0 16px 32px', boxShadow: '0 -6px 40px rgba(0,0,0,.2)' }}>
        <div style={{ width: 36, height: 4, background: T.border, borderRadius: 2, margin: '12px auto 0' }} />
        <div style={{ fontSize: 16, fontWeight: 700, color: T.text, textAlign: 'center', padding: '14px 0 12px', borderBottom: `1px solid ${T.border}` }}>İşlem Ekle</div>
        <div style={{ marginTop: 14 }}>
          <SegControl tabs={[['income', 'Gelir'], ['expense', 'Gider']]} active={type} onChange={setType} T={T} />

          <div style={{ fontSize: 11, fontWeight: 700, color: T.textSub, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Tutar</div>
          <div style={{ position: 'relative' }}>
            <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', fontFamily: "'DM Mono',monospace", fontSize: 18, color: T.textSub }}>₺</span>
            <input value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0,00" type="number" style={{ width: '100%', height: 52, border: `1.5px solid ${T.primary}`, borderRadius: 10, padding: '0 14px 0 32px', fontFamily: "'DM Mono',monospace", fontSize: 18, fontWeight: 500, outline: 'none', boxShadow: `0 0 0 3px ${T.primaryLight}`, background: T.surface, color: T.text }} />
          </div>
        </div>
        <div style={{ marginTop: 13 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: T.textSub, marginBottom: 7, textTransform: 'uppercase', letterSpacing: '.05em' }}>Kategori</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {cats.map((c) =>

          <div style={{ fontSize: 11, fontWeight: 700, color: T.textSub, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Tarih</div>
          <div style={{ height: 42, border: `1px solid ${T.border}`, borderRadius: 10, background: T.surface2, display: 'flex', alignItems: 'center', padding: '0 14px', fontSize: 13, color: T.textSub }}>22.04.2026 — Bugün</div>
        </div>
        <button style={{ width: '100%', height: 52, background: T.primary, color: '#fff', border: 'none', borderRadius: 12, fontFamily: "'DM Sans',sans-serif", fontSize: 15, fontWeight: 700, marginTop: 16, cursor: 'pointer', boxShadow: T.fab }}>Kaydet</button>
      </div>
    </div>);

}

// ─── PHONE SHELL ──────────────────────────────────────────────────────────────
function PhoneShell({ children, T }) {
  return (
    <div style={{ width: 390, height: 844, background: T.shellBg, borderRadius: 46, overflow: 'hidden', position: 'relative', boxShadow: '0 28px 80px rgba(0,0,0,.28),inset 0 0 0 1.5px rgba(255,255,255,.08)', display: 'flex', flexDirection: 'column', fontFamily: "'DM Sans',sans-serif", transition: 'background .3s' }}>
      <StatusBar T={T} />
      {children}
    </div>);

}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState(() => {
    const p = new URLSearchParams(window.location.search).get('screen');
    return p || localStorage.getItem('pc_screen') || 'home';
  });
  const [modal, setModal] = React.useState(false);
  const [theme, setTheme] = React.useState(() => localStorage.getItem('pc_theme') || 'light');
  const [accent, setAccent] = React.useState(() => localStorage.getItem('pc_accent') || 'purple');
  const [chartStyle, setChartStyle] = React.useState('bar');
  const [isMobile, setIsMobile] = React.useState(() => window.matchMedia('(max-width: 600px)').matches);

  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 600px)');
    const h = (e) => setIsMobile(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);

  React.useEffect(() => {
    window.__setTheme = (v) => { setTheme(v); localStorage.setItem('pc_theme', v); };
    window.__setAccent = (v) => { setAccent(v); localStorage.setItem('pc_accent', v); };
    window.__setChart = (v) => setChartStyle(v);
  }, []);

  const T = makeTheme(theme, accent);

  React.useEffect(() => {
    const tag = document.querySelector('meta[name="theme-color"]');
    if (tag) tag.setAttribute('content', T.primary);
    if (isMobile) document.body.style.background = T.bg;
    else document.body.style.background = '';
  }, [isMobile, T.bg, T.primary]);

  const navigate = (id) => {
    if (id === 'fab') { setModal(true); return; }
    setScreen(id);
    localStorage.setItem('pc_screen', id);
  };

  const screenTitles = { home: 'Ana Sayfa', debts: 'Borçlar', txns: 'İşlemler', reports: 'Raporlar', budgets: 'Bütçe & Birikimler', settings: 'Ayarlar' };

  const renderScreen = () => {
    switch (screen) {
      case 'home':     return <DashboardScreen T={T} onNav={navigate} />;
      case 'debts':    return <DebtsScreen T={T} />;
      case 'txns':     return <TransactionsScreen T={T} />;
      case 'reports':  return <ReportsScreen T={T} chartStyle={chartStyle} />;
      case 'budgets':  return <BudgetsScreen T={T} />;
      case 'settings': return <SettingsScreen T={T} isDark={theme === 'dark'}
        onToggleDark={() => { const n = theme === 'dark' ? 'light' : 'dark'; setTheme(n); localStorage.setItem('pc_theme', n); }}
        accent={accent} onAccent={(v) => { setAccent(v); localStorage.setItem('pc_accent', v); window.__setAccent && window.__setAccent(v); }} />;
      default:         return <DashboardScreen T={T} onNav={navigate} />;
    }
  };

  const renderHeader = () => screen === 'settings'
    ? <div style={{ height: 56, display: 'flex', alignItems: 'center', padding: '0 16px', background: T.surface, borderBottom: `1px solid ${T.border}`, flexShrink: 0 }}>
        <span style={{ fontSize: 16, fontWeight: 700, color: T.text }}>Ayarlar</span>
      </div>
    : <AppHeader title={screenTitles[screen] || 'ParaCep'} T={T} onSettings={() => navigate('settings')} showNotif={screen === 'home'} />;

  const TAB_ITEMS = [
    { id: 'home',   lbl: 'Ana Sayfa', icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id: 'debts',  lbl: 'Borçlar',   icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> },
    { id: 'fab',    lbl: '',          icon: null },
    { id: 'txns',   lbl: 'İşlemler',  icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg> },
    { id: 'reports',lbl: 'Raporlar',  icon: (c) => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg> },
  ];

  const renderTabBar = (iconSize = 22, lblSize = 10, fabOffset = -18) =>
    TAB_ITEMS.map((t) => t.id === 'fab'
      ? <div key="fab" style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
          <button onClick={() => navigate('fab')} style={{ width: 52, height: 52, borderRadius: '50%', background: T.primary, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.fab, marginTop: fabOffset }}>
            <svg width="24" height="24" fill="none" stroke="#fff" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      : <button key={t.id} onClick={() => navigate(t.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, background: 'none', border: 'none', cursor: 'pointer', padding: 0, minHeight: 44 }}>
          {t.icon(screen === t.id ? T.primary : T.textMut)}
          <span style={{ fontSize: lblSize, fontWeight: 600, color: screen === t.id ? T.primary : T.textMut }}>{t.lbl}</span>
        </button>
    );

  // ── MOBİL LAYOUT (gerçek cihaz tam ekran) ─────────────────────────────────
  if (isMobile) {
    return (
      <div style={{ position: 'fixed', inset: 0, background: T.bg, display: 'flex', flexDirection: 'column', fontFamily: "'DM Sans',sans-serif", overflow: 'hidden' }}>
        {/* Status bar safe area — header rengiyle doldur */}
        <div style={{ height: 'env(safe-area-inset-top)', background: T.surface, flexShrink: 0 }} />
        {renderHeader()}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
          {renderScreen()}
          {modal && <QuickAddModal onClose={() => setModal(false)} T={T} />}
        </div>
        <div style={{ background: T.surface, borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'flex-start', padding: '8px 0 0', paddingBottom: 'env(safe-area-inset-bottom)', flexShrink: 0 }}>
          {renderTabBar()}
        </div>
      </div>
    );
  }

  // ── MASAÜSTÜ PROTOTIP LAYOUT ───────────────────────────────────────────────
  const navItems = [
    { id: 'home', lbl: 'Ana Sayfa' }, { id: 'debts', lbl: 'Borçlar' },
    { id: 'fab', lbl: 'Hızlı Ekle' }, { id: 'budgets', lbl: 'Bütçe' },
    { id: 'txns', lbl: 'İşlemler' }, { id: 'reports', lbl: 'Raporlar' },
    { id: 'settings', lbl: 'Ayarlar' },
  ];

  return (
    <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start', padding: 32 }}>
      <div style={{ width: 190, display: 'flex', flexDirection: 'column', gap: 4, paddingTop: 4, flexShrink: 0 }}>
        <div style={{ marginBottom: 18, paddingLeft: 4 }}>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 20, color: T.primary, letterSpacing: '-.02em' }}>Para<span style={{ color: T.success }}>Cep</span></div>
          <div style={{ fontSize: 10, color: '#9CA3AF', fontWeight: 500, marginTop: 1 }}>Mobil Prototip v1.2</div>
        </div>
        <div style={{ fontSize: 9, fontWeight: 700, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '.08em', padding: '0 12px', marginBottom: 2 }}>Ekranlar</div>
        {navItems.map((n) =>
          <button key={n.id} className={`sidebar-btn${screen === n.id || (n.id === 'fab' && modal) ? ' active' : ''}`} onClick={() => navigate(n.id)}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.primary, opacity: screen === n.id || (n.id === 'fab' && modal) ? 1 : 0, flexShrink: 0 }} />
            {n.lbl}
          </button>
        )}
        <div style={{ marginTop: 16, padding: '11px 12px', background: theme === 'dark' ? '#1E293B' : T.primaryLight, borderRadius: 10 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: T.primary, marginBottom: 3 }}>390 × 844 · iOS</div>
          <div style={{ fontSize: 10, color: '#6B7280', lineHeight: 1.5 }}>Tab bar veya sol menü<br />ile gezinin</div>
        </div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: '#6B7280', textTransform: 'uppercase', letterSpacing: '.07em' }}>{screenTitles[screen] || 'İşlem Ekle'}</div>
        <PhoneShell T={T}>
          {renderHeader()}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
            {renderScreen()}
            {modal && <QuickAddModal onClose={() => setModal(false)} T={T} />}
          </div>
          <div style={{ height: 76, background: T.surface, borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'flex-start', padding: '8px 0 0', flexShrink: 0 }}>
            {renderTabBar(20, 9, -18)}
          </div>
        </PhoneShell>
        <div style={{ fontSize: 10, color: '#9CA3AF', textAlign: 'center' }}>Tweaks ile tema & grafik stilini değiştirin</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { scope: '/ParaCep/' })
      .catch(() => {/* local file:// veya eski tarayıcı — sessizce geç */});
  });
}
</script>
