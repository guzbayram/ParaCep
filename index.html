// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  // ── Auth & data state ──
  const [authReady, setAuthReady] = React.useState(false);
  const [user, setUser] = React.useState(null);
  const [authView, setAuthView] = React.useState('login');
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);

  // ── UI state ──
  const [screen, setScreen] = React.useState(() => new URLSearchParams(window.location.search).get('screen') || localStorage.getItem('pc_screen') || 'home');
  const [modal, setModal] = React.useState(false);
  const [theme, setTheme] = React.useState(() => localStorage.getItem('pc_theme') || 'light');
  const [accent, setAccent] = React.useState(() => localStorage.getItem('pc_accent') || 'purple');
  const [chartStyle, setChartStyle] = React.useState('bar');
  const [fontScaleKey, setFontScaleKey] = React.useState(() => localStorage.getItem('pc_fskey') || 'm');
  const [fontScale, setFontScale]       = React.useState(() => parseFloat(localStorage.getItem('pc_fs')) || 1.0);
  const [isMobile, setIsMobile] = React.useState(() => window.matchMedia('(max-width: 600px)').matches);

  const db = firebase.firestore();
  const auth = firebase.auth();

  // Mobile detection
  React.useEffect(() => {
    const mq = window.matchMedia('(max-width: 600px)');
    const h = e => setIsMobile(e.matches);
    mq.addEventListener('change', h);
    return () => mq.removeEventListener('change', h);
  }, []);

  // Tweaks panel
  React.useEffect(() => {
    window.__setTheme = v => { setTheme(v); localStorage.setItem('pc_theme', v); };
    window.__setAccent = v => { setAccent(v); localStorage.setItem('pc_accent', v); };
    window.__setChart = v => setChartStyle(v);
  }, []);

  // Auth state listener
  React.useEffect(() => {
    return auth.onAuthStateChanged(u => {
      setUser(u);
      setAuthReady(true);
      if (!u) { DATA = { ...SEED_DATA }; forceUpdate(); }
    });
  }, []);

  // Firestore real-time listeners
  React.useEffect(() => {
    if (!user) return;
    const uid = user.uid;
    const raw = { transactions: [], cards: [], loans: [], budgets: [], upcoming: [], recurring: [] };
    const refresh = (key, val) => { raw[key] = val; DATA = computeAppData(raw); forceUpdate(); };
    const unsubs = [
      db.collection(`users/${uid}/transactions`).orderBy('createdAt', 'desc').onSnapshot(s => refresh('transactions', s.docs.map(d => ({ id: d.id, ...d.data() })))),
      db.collection(`users/${uid}/cards`).onSnapshot(s => refresh('cards', s.docs.map(d => ({ id: d.id, ...d.data() })))),
      db.collection(`users/${uid}/loans`).onSnapshot(s => refresh('loans', s.docs.map(d => ({ id: d.id, ...d.data() })))),
      db.collection(`users/${uid}/budgets`).onSnapshot(s => refresh('budgets', s.docs.map(d => ({ id: d.id, ...d.data() })))),
      db.collection(`users/${uid}/upcoming`).onSnapshot(s => refresh('upcoming', s.docs.map(d => ({ id: d.id, ...d.data() })))),
      db.collection(`users/${uid}/recurring`).onSnapshot(s => refresh('recurring', s.docs.map(d => ({ id: d.id, ...d.data() })))),
    ];
    // Load saved theme/accent
    db.doc(`users/${uid}/meta/profile`).get().then(doc => {
      if (!doc.exists) return;
      const p = doc.data();
      if (p.theme) { setTheme(p.theme); localStorage.setItem('pc_theme', p.theme); }
      if (p.accent) { setAccent(p.accent); localStorage.setItem('pc_accent', p.accent); }
      if (p.fontScaleKey) {
        const opt = FONT_SCALES.find(f => f.key === p.fontScaleKey);
        if (opt) { setFontScaleKey(opt.key); setFontScale(opt.scale); localStorage.setItem('pc_fskey', opt.key); localStorage.setItem('pc_fs', opt.scale); }
      }
    });
    return () => unsubs.forEach(u => u());
  }, [user]);

  const T = makeTheme(theme, accent, fontScale);

  React.useEffect(() => {
    const tag = document.querySelector('meta[name="theme-color"]');
    if (tag) tag.setAttribute('content', T.primary);
    if (isMobile) document.body.style.background = T.bg;
    else document.body.style.background = '';
  }, [isMobile, T.bg, T.primary]);

  // ── Actions ──
  const navigate = id => {
    if (id === 'fab') { setModal(true); return; }
    setScreen(id); localStorage.setItem('pc_screen', id);
  };

  const saveTransaction = async txData => {
    if (!user) return;
    await db.collection(`users/${user.uid}/transactions`).add({ ...txData, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  };

  const handleLogout = async () => {
    await auth.signOut();
    setScreen('home'); localStorage.removeItem('pc_screen');
  };

  const handleExport = () => {
    const blob = new Blob([JSON.stringify({ transactions: DATA.transactions, cards: DATA.cards, loans: DATA.loans, budgets: DATA.budgets }, null, 2)], { type: 'application/json' });
    const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(blob), download: 'paracep-verilerim.json' });
    a.click(); URL.revokeObjectURL(a.href);
  };

  const handleDeleteData = async () => {
    if (!user || !window.confirm('Tüm işlem verileriniz silinecek. Bu işlem geri alınamaz!')) return;
    const uid = user.uid;
    for (const col of ['transactions', 'cards', 'loans', 'budgets', 'upcoming']) {
      const snap = await db.collection(`users/${uid}/${col}`).get();
      const batch = db.batch(); snap.docs.forEach(d => batch.delete(d.ref)); await batch.commit();
    }
  };

  const screenTitles = { home: 'Ana Sayfa', debts: 'Borçlar', txns: 'İşlemler', reports: 'Raporlar', budgets: 'Bütçe & Birikimler', settings: 'Ayarlar' };

  const renderScreen = () => {
    switch (screen) {
      case 'home':     return <DashboardScreen T={T} onNav={navigate} />;
      case 'debts':    return <DebtsScreen T={T} />;
      case 'txns':     return <TransactionsScreen T={T} />;
      case 'reports':  return <ReportsScreen T={T} chartStyle={chartStyle} />;
      case 'budgets':  return <BudgetsScreen T={T} />;
      case 'settings': return <SettingsScreen T={T}
        isDark={theme === 'dark'}
        onToggleDark={() => { const n = theme === 'dark' ? 'light' : 'dark'; setTheme(n); localStorage.setItem('pc_theme', n); if (user) db.doc(`users/${user.uid}/meta/profile`).set({ theme: n }, { merge: true }); }}
        accent={accent}
        onAccent={v => { setAccent(v); localStorage.setItem('pc_accent', v); window.__setAccent && window.__setAccent(v); if (user) db.doc(`users/${user.uid}/meta/profile`).set({ accent: v }, { merge: true }); }}
        fontScaleKey={fontScaleKey}
        onFontScale={(key, scale) => { setFontScaleKey(key); setFontScale(scale); localStorage.setItem('pc_fskey', key); localStorage.setItem('pc_fs', scale); if (user) db.doc(`users/${user.uid}/meta/profile`).set({ fontScaleKey: key }, { merge: true }); }}
        user={user} onLogout={handleLogout} onExport={handleExport} onDeleteData={handleDeleteData} />;
      default:         return <DashboardScreen T={T} onNav={navigate} />;
    }
  };

  const renderHeader = () => screen === 'settings'
    ? <div style={{ height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', background: T.surface, borderBottom: `1px solid ${T.border}`, flexShrink: 0 }}>
        <span style={{ fontSize: 16, fontWeight: 700, color: T.text }}>Ayarlar</span>
        <button onClick={handleLogout} title="Çıkış Yap" style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.danger, padding: 4, minWidth: 40, minHeight: 44, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    : <AppHeader title={screenTitles[screen] || 'ParaCep'} T={T} onSettings={() => navigate('settings')} onLogout={handleLogout} onReports={screen !== 'reports' ? () => navigate('reports') : null} showNotif={screen === 'home'} />;

  const TAB_ITEMS = [
    { id: 'home',    lbl: 'Ana Sayfa', icon: c => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
    { id: 'debts',   lbl: 'Borçlar',   icon: c => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg> },
    { id: 'fab',     lbl: '',          icon: null },
    { id: 'budgets', lbl: 'Bütçe',     icon: c => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/><path d="M7 8h.01M12 8h5M7 12h10"/></svg> },
    { id: 'txns',    lbl: 'İşlemler',  icon: c => <svg width="22" height="22" fill="none" stroke={c} strokeWidth="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg> },
  ];

  const renderTabBar = (lblSize = 10, fabOffset = -18) => {
    const lbl = T.fs(lblSize);
    return TAB_ITEMS.map(t => t.id === 'fab'
      ? <div key="fab" style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
          <button onClick={() => navigate('fab')} style={{ width: 52, height: 52, borderRadius: '50%', background: T.primary, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: T.fab, marginTop: fabOffset }}>
            <svg width="24" height="24" fill="none" stroke="#fff" strokeWidth="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
        </div>
      : <button key={t.id} onClick={() => navigate(t.id)} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, background: 'none', border: 'none', cursor: 'pointer', padding: 0, minHeight: 44 }}>
          {t.icon(screen === t.id ? T.primary : T.textMut)}
          <span style={{ fontSize: lbl, fontWeight: 600, color: screen === t.id ? T.primary : T.textMut }}>{t.lbl}</span>
        </button>
    );
  };

  // ── Auth loading splash ──
  if (!authReady) return (
    <div style={{ position: 'fixed', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#F5F3FF', fontFamily: "'DM Sans',sans-serif" }}>
      <div style={{ fontWeight: 800, fontSize: 36, color: '#7C3AED', letterSpacing: '-.03em' }}>Para<span style={{ color: '#059669' }}>Cep</span></div>
      <div style={{ marginTop: 16, width: 32, height: 32, border: '3px solid #E9D5FF', borderTop: '3px solid #7C3AED', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }} />
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  // ── Auth screens ──
  if (!user) {
    if (authView === 'register') return <RegisterScreen onGoLogin={() => setAuthView('login')} />;
    return <LoginScreen onGoRegister={() => setAuthView('register')} />;
  }

  // ── Mobile full-screen layout ──
  if (isMobile) return (
    <div style={{ position: 'fixed', inset: 0, background: T.bg, display: 'flex', flexDirection: 'column', fontFamily: "'DM Sans',sans-serif", overflow: 'hidden' }}>
      <div style={{ height: 'env(safe-area-inset-top)', background: T.surface, flexShrink: 0 }} />
      {renderHeader()}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
        {renderScreen()}
        {modal && <QuickAddModal onClose={() => setModal(false)} onSave={saveTransaction} T={T} />}
      </div>
      <div style={{ background: T.surface, borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'flex-start', padding: '8px 0 0', paddingBottom: 'env(safe-area-inset-bottom)', flexShrink: 0 }}>
        {renderTabBar()}
      </div>
    </div>
  );

  // ── Desktop prototype layout ──
  const navItems = [
    { id: 'home', lbl: 'Ana Sayfa' }, { id: 'debts', lbl: 'Borçlar' },
    { id: 'fab', lbl: 'Hızlı Ekle' }, { id: 'budgets', lbl: 'Bütçe' },
    { id: 'txns', lbl: 'İşlemler' }, { id: 'reports', lbl: 'Raporlar' },
    { id: 'settings', lbl: 'Ayarlar' },
  ];
  return (
    <div style={{ display: 'flex', gap: 32, alignItems: 'flex-start', padding: 32 }}>
      <div style={{ width: 190, display: 'flex', flexDirection: 'column', gap: 4, paddingTop: 4, flexShrink: 0 }}>
        <div style={{ marginBottom: 18, paddingLeft: 4 }}>
          <div style={{ fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 20, color: T.primary, letterSpacing: '-.02em' }}>Para<span style={{ color: T.success }}>Cep</span></div>
          <div style={{ fontSize: 10, color: '#9CA3AF', fontWeight: 500, marginTop: 1 }}>v1.2 · {user.displayName || user.email}</div>
        </div>
        <div style={{ fontSize: 9, fontWeight: 700, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '.08em', padding: '0 12px', marginBottom: 2 }}>Ekranlar</div>
        {navItems.map(n =>
          <button key={n.id} className={`sidebar-btn${screen === n.id || (n.id === 'fab' && modal) ? ' active' : ''}`} onClick={() => navigate(n.id)}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: T.primary, opacity: screen === n.id || (n.id === 'fab' && modal) ? 1 : 0, flexShrink: 0 }} />
            {n.lbl}
          </button>
        )}
        <button onClick={handleLogout} style={{ marginTop: 12, width: '100%', padding: '9px 12px', borderRadius: 10, background: 'none', border: `1px solid ${T.border}`, cursor: 'pointer', fontSize: 12, fontWeight: 600, color: T.danger, fontFamily: "'DM Sans',sans-serif", textAlign: 'left' }}>🚪 Çıkış Yap</button>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: '#6B7280', textTransform: 'uppercase', letterSpacing: '.07em' }}>{screenTitles[screen] || 'İşlem Ekle'}</div>
        <PhoneShell T={T}>
          {renderHeader()}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', position: 'relative' }}>
            {renderScreen()}
            {modal && <QuickAddModal onClose={() => setModal(false)} onSave={saveTransaction} T={T} />}
          </div>
          <div style={{ height: 76, background: T.surface, borderTop: `1px solid ${T.border}`, display: 'flex', alignItems: 'flex-start', padding: '8px 0 0', flexShrink: 0 }}>
            {renderTabBar(9, -18)}
          </div>
        </PhoneShell>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js', { scope: '/ParaCep/' })
      .catch(() => {/* local file:// veya eski tarayıcı — sessizce geç */});
  });
}
</script>
</body>
</html>
