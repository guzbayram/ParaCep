function updateTweakBtns(id,activeIdx){const btns=document.getElementById(id).querySelectorAll('button');btns.forEach((b,i)=>b.classList.toggle('on',i===activeIdx))}
function postEdit(){window.parent.postMessage({type:'__edit_mode_set_keys',edits:tweakState},'*')}

});

function makeTheme(mode, accentKey, fontScale = 1) {
  const acc = ACCENTS[accentKey] || ACCENTS.purple;
  const dark = mode === 'dark';
  const fs = (n) => Math.round(n * fontScale);
  return {
    ...acc,
    dark, fontScale, fs,
    success: '#059669', successBg: dark ? '#064E3B20' : '#ECFDF5',

const fmt = (v) => `₺${Math.abs(v).toLocaleString('tr-TR', { minimumFractionDigits: 2 })}`;
const fmtK = (v) => v >= 1000 ? `₺${(v / 1000).toLocaleString('tr-TR', { minimumFractionDigits: 0 })}B` : fmt(v);

const CAT_COLORS = {
  'Mutfak': '#F59E0B', 'Ulaşım': '#8B5CF6', 'Sağlık': '#10B981',
  'Giyim': '#EC4899', 'Ev Giderleri': '#3B82F6', 'Gelir': '#059669',
  'Abonelik': '#EF4444', 'Birikim': '#6366F1', 'Diğer': '#9CA3AF'
};

function computeAppData(raw) {
  const txns = raw.transactions || [];
  const income  = txns.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0);
  const expense = txns.filter(t => t.amount < 0).reduce((s,t) => s + Math.abs(t.amount), 0);
  const balance = income - expense;

  // Last 6 months
  const now = new Date();
  const months = Array.from({ length: 6 }, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - (5 - i), 1);
    const next = new Date(d.getFullYear(), d.getMonth() + 1, 1);
    const mTxns = txns.filter(t => {
      const [dd, mm, yy] = t.date.split('.');
      const td = new Date(+yy, +mm - 1, +dd);
      return td >= d && td < next;
    });
    return {
      label: d.toLocaleDateString('tr-TR', { month: 'short' }),
      income:  mTxns.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0),
      expense: mTxns.filter(t => t.amount < 0).reduce((s,t) => s + Math.abs(t.amount), 0),
    };
  });

  // Category breakdown (all-time expenses)
  const catMap = {};
  txns.filter(t => t.amount < 0).forEach(t => {
    const key = t.cat || 'Diğer';
    if (!catMap[key]) catMap[key] = { amt: 0, color: t.catColor || CAT_COLORS[key] || '#9CA3AF' };
    catMap[key].amt += Math.abs(t.amount);
  });
  const totalExp = Object.values(catMap).reduce((s, v) => s + v.amt, 0);
  const cats = Object.entries(catMap)
    .map(([name, { amt, color }]) => ({ name, amt, pct: totalExp ? Math.round(amt / totalExp * 100) : 0, color }))
    .sort((a, b) => b.amt - a.amt).slice(0, 5);

  return {
    ...SEED_DATA,
    ...raw,
    balance, income, expense,
    monthLabels: months.map(m => m.label),
    monthIncomes: months.map(m => m.income),
    monthExpenses: months.map(m => m.expense),
    cats: cats.length ? cats : SEED_DATA.cats,
  };
}

async function seedUserData(uid, name) {
  const db = firebase.firestore();
  const ts = (d) => firebase.firestore.Timestamp.fromDate(new Date(d));
  const batch = db.batch();
  batch.set(db.doc(`users/${uid}/meta/profile`), { name, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
  const txns = [
    { label: 'Maaş', cat: 'Gelir', catColor: '#059669', amount: 10000, date: '01.04.2026', createdAt: ts('2026-04-01') },
    { label: 'Freelance Gelir', cat: 'Gelir', catColor: '#059669', amount: 2000, date: '10.04.2026', createdAt: ts('2026-04-10') },
    { label: 'Market Alışverişi', cat: 'Mutfak', catColor: '#F59E0B', amount: -342.80, date: '21.04.2026', createdAt: ts('2026-04-21') },
    { label: 'Akaryakıt', cat: 'Ulaşım', catColor: '#8B5CF6', amount: -650, date: '20.04.2026', createdAt: ts('2026-04-20') },
    { label: 'Netflix', cat: 'Abonelik', catColor: '#EF4444', amount: -59.90, date: '18.04.2026', createdAt: ts('2026-04-18') },
    { label: 'Elektrik Faturası', cat: 'Ev Giderleri', catColor: '#3B82F6', amount: -265, date: '15.04.2026', createdAt: ts('2026-04-15') },
  ];
  txns.forEach(t => batch.set(db.collection(`users/${uid}/transactions`).doc(), t));
  SEED_DATA.cards.forEach(c => batch.set(db.collection(`users/${uid}/cards`).doc(), c));
  SEED_DATA.loans.forEach(l => batch.set(db.collection(`users/${uid}/loans`).doc(), l));
  SEED_DATA.budgets.forEach(b => batch.set(db.collection(`users/${uid}/budgets`).doc(), b));
  SEED_DATA.upcoming.forEach(u => batch.set(db.collection(`users/${uid}/upcoming`).doc(), u));
  await batch.commit();
}

// ─── SVG CHARTS ───────────────────────────────────────────────────────────────
function BarChart({ incomes, expenses, labels, T, lineMode = false }) {
  const maxV = Math.max(...incomes, ...expenses);
  const W = 280,H = 100,n = labels.length,bw = Math.floor(W / n),pad = 6;
  if (lineMode) {
    const pts = (arr) => arr.map((v, i) => `${i * (W / (n - 1))},${H - v / maxV * H}`).join(' ');
    return <svg width={W} height={H + 20} style={{ overflow: 'visible' }}>
      {[incomes, expenses].map((arr, di) => {
        const color = di === 0 ? T.success : '#DC2626';
        const points = arr.map((v, i) => ({ x: i * (W / (n - 1)), y: H - v / maxV * H }));
        const d = 'M' + points.map((p) => `${p.x},${p.y}`).join(' L');
        return <g key={di}>
          <polyline points={pts(arr)} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" />
          {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3.5" fill={color} />)}
        </g>;
      })}
      {labels.map((l, i) => <text key={i} x={i * (W / (n - 1))} y={H + 16} textAnchor="middle" fontSize="10" fill={T.textSub} fontFamily="DM Sans">{l}</text>)}
    </svg>;
  }
  return <svg width={W} height={H + 20} style={{ overflow: 'visible' }}>
    {labels.map((l, i) => {
      const x = i * bw + pad / 2;const bWidth = bw - pad;
      const ih = incomes[i] / maxV * H;const eh = expenses[i] / maxV * H;
      const hw = Math.floor(bWidth / 2) - 1;
      return <g key={i}>
        <rect x={x} y={H - ih} width={hw} height={ih} rx="2" fill={T.success} opacity=".75" />
        <rect x={x + hw + 2} y={H - eh} width={hw} height={eh} rx="2" fill="#DC2626" opacity=".65" />
        <text x={x + bWidth / 2} y={H + 16} textAnchor="middle" fontSize="10" fill={T.textSub} fontFamily="DM Sans">{l}</text>
      </g>;
    })}
  </svg>;
}

function DonutChart({ cats, T }) {
  const R = 54,r = 32,cx = 60,cy = 60;
  let cur = 0;
  const slices = cats.map((c) => {
    const pct = c.pct / 100,start = cur,end = cur + pct;cur = end;
    const s = start * 2 * Math.PI - Math.PI / 2;const e = end * 2 * Math.PI - Math.PI / 2;
    const x1 = cx + R * Math.cos(s),y1 = cy + R * Math.sin(s);
    const x2 = cx + R * Math.cos(e),y2 = cy + R * Math.sin(e);
    const lf = pct > .5 ? 1 : 0;
    const ix1 = cx + r * Math.cos(s),iy1 = cy + r * Math.sin(s);
    const ix2 = cx + r * Math.cos(e),iy2 = cy + r * Math.sin(e);
    return { d: `M${x1} ${y1} A${R} ${R} 0 ${lf} 1 ${x2} ${y2} L${ix2} ${iy2} A${r} ${r} 0 ${lf} 0 ${ix1} ${iy1}Z`, color: c.color };
  });
  return <svg width="120" height="120">
    {slices.map((s, i) => <path key={i} d={s.d} fill={s.color} />)}
    <circle cx={cx} cy={cy} r="26" fill={T.surface} />
    <text x={cx} y={cy - 4} textAnchor="middle" fontSize="12" fontWeight="700" fill={T.text} fontFamily="DM Sans">%</text>
    <text x={cx} y={cy + 10} textAnchor="middle" fontSize="9" fill={T.textSub} fontFamily="DM Sans">dağılım</text>
  </svg>;
}

              </div>
            ))}
          </div>}
        </div>
        {DATA.loans.map((l, i) => {
          const rc = l.remaining_count || 0;
          const inst = l.installments || 0;
          const remaining = l.remaining !== undefined ? l.remaining : (l.monthly || 0) * rc;
          const totalPaidC = l.totalPaid !== undefined ? l.totalPaid : (l.monthly || 0) * (inst - rc);
          const total = remaining + totalPaidC;
          const paidPct = total > 0 ? Math.round(totalPaidC / total * 100) : 0;
          const dueStr = l.dueDay ? `Her ay ${l.dueDay}. gün` : (l.due || '');
          return (
            <Card key={l.id || i} T={T} style={{ padding: '14px 16px' }}>

                  }

                <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>

                    <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(14), fontWeight: 500, color: T.text }}>{fmt(l.monthly)}<span style={{ fontSize: T.fs(10), fontFamily: "'DM Sans'" }}>/ay</span></div>
                    <div style={{ fontSize: T.fs(11), color: T.textSub }}>Kalan: {fmtK(remaining)}</div>
                  </div>
                  <button onClick={() => { setEditing(l); setModal('editLoan'); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.textMut, padding: '2px 4px' }}>
                    <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                  </button>

                  </button>
                </div>
              </div>
              <div style={{ marginTop: 10 }}>
                <ProgressBar value={paidPct} color={T.success} T={T} />
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 5 }}>
                  <span style={{ fontSize: 10, color: T.textSub }}>%{paidPct} ödendi</span>
                  <span style={{ fontSize: 10, color: T.textSub }}>{fmtK(totalPaidC)} ödenen</span>
                </div>
              </div>
            </Card>);
        })}
        <button onClick={() => setModal('loan')} style={{ width: '100%', padding: '12px 0', borderRadius: 12, background: '#F3F4F6', border: '1.5px dashed #6B7280', color: '#374151', fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>+ Yeni Kredi Ekle</button>

    {modal === 'editLoan' && editing && <AddLoanModal onClose={() => { setModal(null); setEditing(null); }} T={T} existing={editing} />}
  </>;
}

// ─── İŞLEM DÜZENLE MODAL ──────────────────────────────────────────────────────
function EditTransactionModal({ tx, onClose, T }) {
  const isIncome = tx.amount > 0;
  const [type, setType]     = React.useState(isIncome ? 'income' : 'expense');
  const [amount, setAmount] = React.useState(String(Math.abs(tx.amount)));
  const [label, setLabel]   = React.useState(tx.label || '');
  const [cat, setCat]       = React.useState(isIncome ? 'Gelir' : (tx.cat || 'Mutfak'));
  const [date, setDate]     = React.useState(() => {
    // Convert DD.MM.YYYY → YYYY-MM-DD for input[type=date]
    const parts = (tx.date || '').split('.');
    return parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : new Date().toISOString().slice(0,10);
  });
  const [saving, setSaving] = React.useState(false);
  const [deleting, setDeleting] = React.useState(false);

  const CATS = ['Mutfak','Ulaşım','Sağlık','Giyim','Ev Giderleri','Gelir','Abonelik','Birikim','Diğer'];
  const user = firebase.auth().currentUser;
  const db   = firebase.firestore();

  const trDate = (iso) => { const [y,m,d] = iso.split('-'); return `${d}.${m}.${y}`; };

  const handleSave = async () => {
    const amt = parseFloat(amount.replace(',','.'));
    if (!amt || amt <= 0) return;
    setSaving(true);
    const effectiveCat = type === 'income' ? 'Gelir' : cat;
    await db.collection(`users/${user.uid}/transactions`).doc(tx.id).update({
      label: label.trim() || effectiveCat,
      cat: effectiveCat,
      catColor: type === 'income' ? '#059669' : (CAT_COLORS[cat] || '#9CA3AF'),
      amount: type === 'income' ? amt : -amt,
      date: trDate(date),
    });
    setSaving(false);
    onClose();
  };

  const handleDelete = async () => {
    if (!window.confirm('Bu işlemi silmek istiyor musunuz?')) return;
    setDeleting(true);
    await db.collection(`users/${user.uid}/transactions`).doc(tx.id).delete();
    setDeleting(false);
    onClose();
  };

  return (
    <BottomSheet title="İşlemi Düzenle" onClose={onClose} T={T}>
      <SegControl tabs={[['expense','Gider'],['income','Gelir']]} active={type}
        onChange={v => { setType(v); setCat(v === 'income' ? 'Gelir' : 'Mutfak'); }} T={T} />

      <div style={{ marginTop: 14 }}>
        <div style={{ fontSize: T.fs(11), fontWeight: 600, color: T.textSub, marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>Tutar</div>
        <div style={{ position: 'relative' }}>
          <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', fontFamily: "'DM Mono',monospace", fontSize: 18, color: T.textSub }}>₺</span>
          <input value={amount} onChange={e => setAmount(e.target.value)} type="number" inputMode="decimal" placeholder="0,00"
            style={{ width: '100%', height: 52, border: `1.5px solid ${T.primary}`, borderRadius: 10, padding: '0 14px 0 32px', fontFamily: "'DM Mono',monospace", fontSize: 18, fontWeight: 500, outline: 'none', boxShadow: `0 0 0 3px ${T.primaryLight}`, background: T.surface, color: T.text }} />
        </div>
      </div>

      <div style={{ marginTop: 12 }}>
        <div style={{ fontSize: T.fs(11), fontWeight: 600, color: T.textSub, marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>Açıklama</div>
        <input value={label} onChange={e => setLabel(e.target.value)} placeholder={cat}
          style={{ width: '100%', height: 42, border: `1px solid ${T.border}`, borderRadius: 10, padding: '0 14px', fontSize: T.fs(13), outline: 'none', background: T.surface2, color: T.text, fontFamily: "'DM Sans',sans-serif" }} />
      </div>

      {type === 'expense' && <div style={{ marginTop: 12 }}>
        <div style={{ fontSize: T.fs(11), fontWeight: 600, color: T.textSub, marginBottom: 7, textTransform: 'uppercase', letterSpacing: '.05em' }}>Kategori</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {CATS.filter(c => c !== 'Gelir').map(c => <Pill key={c} label={c} active={cat === c} onClick={() => setCat(c)} T={T} />)}
        </div>
      </div>}

      <div style={{ marginTop: 12 }}>
        <div style={{ fontSize: T.fs(11), fontWeight: 600, color: T.textSub, marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>Tarih</div>
        <input type="date" value={date} onChange={e => setDate(e.target.value)}
          style={{ width: '100%', height: 44, border: `1px solid ${T.border}`, borderRadius: 10, padding: '0 14px', fontSize: T.fs(14), outline: 'none', background: T.surface, color: T.text, fontFamily: "'DM Sans',sans-serif" }} />
      </div>

      <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
        <button onClick={handleDelete} disabled={deleting}
          style={{ height: 50, padding: '0 18px', background: T.dangerBg, color: T.danger, border: `1.5px solid ${T.danger}`, borderRadius: 12, fontFamily: "'DM Sans',sans-serif", fontSize: T.fs(14), fontWeight: 700, cursor: deleting ? 'default' : 'pointer', flexShrink: 0 }}>
          {deleting ? '…' : '🗑️'}
        </button>
        <button onClick={handleSave} disabled={saving || !amount}
          style={{ flex: 1, height: 50, background: saving || !amount ? T.textMut : T.primary, color: '#fff', border: 'none', borderRadius: 12, fontFamily: "'DM Sans',sans-serif", fontSize: T.fs(14), fontWeight: 700, cursor: saving || !amount ? 'default' : 'pointer', boxShadow: saving || !amount ? 'none' : T.fab }}>
          {saving ? 'Kaydediliyor…' : 'Güncelle'}
        </button>
      </div>
    </BottomSheet>
  );
}

// ─── BORÇ TAKİP KARTI ─────────────────────────────────────────────────────────
function DebtTrackingCard({ T }) {
  const loans = DATA.loans || [];
  const cards = DATA.cards || [];
  const recurring = DATA.recurring || [];

  // Aylık sabit gider/gelir net farkı
  const monthlyFixedIncome  = recurring.filter(r => r.amount > 0 && r.frequency === 'monthly').reduce((s, r) => s + r.amount, 0);
  const monthlyFixedExpense = recurring.filter(r => r.amount < 0 && r.frequency === 'monthly').reduce((s, r) => s + Math.abs(r.amount), 0);
  const monthlyLoanPayment  = loans.reduce((s, l) => s + (l.monthly || 0), 0);
  const netMonthly = monthlyFixedIncome - monthlyFixedExpense - monthlyLoanPayment;

  // Önümüzdeki 12 ay borç projeksiyonu
  const totalCardDebt = cards.reduce((s, c) => s + (c.balance || 0), 0);
  const now = new Date();

  const projection = Array.from({ length: 13 }, (_, m) => {
    const d = new Date(now.getFullYear(), now.getMonth() + m, 1);
    const lbl = m === 0 ? 'Şimdi' : d.toLocaleDateString('tr-TR', { month: 'short', year: m > 11 ? '2-digit' : undefined });
    const loanDebt = loans.reduce((sum, l) => {
      const rem = Math.max(0, (l.remaining_count || 0) - m);
      return sum + (l.monthly || 0) * rem;
    }, 0);
    return { lbl, loanDebt, cardDebt: totalCardDebt, total: loanDebt + totalCardDebt };
  });

  const maxDebt = Math.max(...projection.map(p => p.total), 1);
  const W = 290, H = 100, n = projection.length;
  const pts = projection.map((p, i) => ({ x: i * (W / (n - 1)), y: H - (p.total / maxDebt) * H }));
  const loanPts = projection.map((p, i) => ({ x: i * (W / (n - 1)), y: H - (p.loanDebt / maxDebt) * H }));

  const pathD  = 'M' + pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L');
  const loanD  = 'M' + loanPts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' L');
  const areaD  = pathD + ` L${W},${H} L0,${H} Z`;

  const totalNow   = projection[0].total;
  const total12    = projection[12].total;
  const reduction  = totalNow - total12;
  const pctChange  = totalNow > 0 ? Math.round(reduction / totalNow * 100) : 0;

  // Borç özgürlük ayı tahmini
  const loanFreeMonth = projection.findIndex(p => p.loanDebt === 0);

  if (totalNow === 0) return (
    <Card T={T} style={{ padding: '14px 16px' }}>
      <SectionHdr title="📊 Borç Takip" T={T} />
      <div style={{ textAlign: 'center', padding: '24px 0', color: T.textSub }}>
        <div style={{ fontSize: 28, marginBottom: 8 }}>🎉</div>
        <div style={{ fontSize: T.fs(13), fontWeight: 600 }}>Aktif borcunuz yok!</div>
        <div style={{ fontSize: T.fs(11), marginTop: 4 }}>Kart veya kredi ekleyince takip başlar</div>
      </div>
    </Card>
  );

  return (
    <Card T={T} style={{ padding: '14px 16px' }}>
      <SectionHdr title="📊 Borç Takip — 12 Ay Projeksiyonu" T={T} />

      {/* Özet rozetler */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 14 }}>
        {[
          ['Şu an toplam borç', fmt(totalNow), T.danger],
          ['12 ay sonra', fmt(total12), T.success],
          ['Aylık ödeme yükü', fmt(monthlyLoanPayment), T.warning],
          [netMonthly >= 0 ? 'Aylık net artı' : 'Aylık net eksi', fmt(Math.abs(netMonthly)), netMonthly >= 0 ? T.success : T.danger],
        ].map(([lbl, val, color]) => (
          <div key={lbl} style={{ background: T.surface2, borderRadius: 10, padding: '10px 12px' }}>
            <div style={{ fontSize: T.fs(10), color: T.textSub, marginBottom: 3 }}>{lbl}</div>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(13), fontWeight: 700, color }}>{val}</div>
          </div>
        ))}
      </div>

      {/* Çizgi grafik */}
      <svg width={W} height={H + 24} style={{ overflow: 'visible', display: 'block', margin: '0 auto' }}>
        <defs>
          <linearGradient id="debtGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={T.danger} stopOpacity="0.25" />
            <stop offset="100%" stopColor={T.danger} stopOpacity="0" />
          </linearGradient>
        </defs>
        {/* Grid lines */}
        {[0.25, 0.5, 0.75, 1].map(f => (
          <line key={f} x1="0" y1={H * (1 - f)} x2={W} y2={H * (1 - f)}
            stroke={T.border} strokeWidth="1" strokeDasharray="3,4" />
        ))}
        {/* Area fill */}
        <path d={areaD} fill="url(#debtGrad)" />
        {/* Kredi borcu çizgisi (ayrı renk) */}
        <polyline points={loanPts.map(p => `${p.x},${p.y}`).join(' ')} fill="none" stroke={T.warning} strokeWidth="1.5" strokeDasharray="4,3" opacity=".7" />
        {/* Toplam borç çizgisi */}
        <path d={pathD} fill="none" stroke={T.danger} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" />
        {/* Başlangıç ve bitiş noktaları */}
        <circle cx={pts[0].x} cy={pts[0].y} r="4" fill={T.danger} />
        <circle cx={pts[12].x} cy={pts[12].y} r="4" fill={T.success} />
        {/* X ekseni etiketleri — sadece ilk, 6. ve son */}
        {[0, 6, 12].map(i => (
          <text key={i} x={pts[i].x} y={H + 18} textAnchor="middle" fontSize={T.fs(9)} fill={T.textSub} fontFamily="DM Sans">{projection[i].lbl}</text>
        ))}
      </svg>

      {/* Açıklama satırı */}
      <div style={{ display: 'flex', gap: 14, marginTop: 10, justifyContent: 'center' }}>
        {[['Toplam borç', T.danger, ''], ['Sadece kredi', T.warning, '4,3']].map(([lbl, color, dash]) => (
          <div key={lbl} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
            <svg width="20" height="8"><line x1="0" y1="4" x2="20" y2="4" stroke={color} strokeWidth="2" strokeDasharray={dash} /></svg>
            <span style={{ fontSize: T.fs(10), color: T.textSub }}>{lbl}</span>
          </div>
        ))}
      </div>

      {/* Azalış özeti */}
      <div style={{ marginTop: 12, padding: '10px 14px', background: pctChange > 0 ? T.successBg : T.dangerBg, borderRadius: 10, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div>
          <div style={{ fontSize: T.fs(12), fontWeight: 700, color: pctChange > 0 ? T.success : T.danger }}>
            {pctChange > 0 ? `12 ayda %${pctChange} azalıyor` : 'Borç sabit kalıyor'}
          </div>
          {loanFreeMonth > 0 && loanFreeMonth <= 12 && (
            <div style={{ fontSize: T.fs(11), color: T.textSub, marginTop: 2 }}>
              🏁 {projection[loanFreeMonth].lbl}'da krediniz bitiyor
            </div>
          )}
        </div>
        <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(16), fontWeight: 700, color: pctChange > 0 ? T.success : T.danger }}>
          {pctChange > 0 ? '↓' : '→'}{pctChange > 0 ? fmt(reduction) : ''}
        </div>
      </div>

      {monthlyFixedIncome === 0 && (
        <div style={{ marginTop: 10, padding: '9px 12px', background: T.warningBg, borderRadius: 8 }}>
          <div style={{ fontSize: T.fs(11), color: T.warning, fontWeight: 600 }}>
            💡 İşlemler → 🔁 Sabit'ten aylık gelirini ekle — net nakit akışı hesaplansın
          </div>
        </div>
      )}
    </Card>
  );
}

// ─── BÜTÇE MODÜLLERİ ─────────────────────────────────────────────────────────
const BUDGET_ICONS = ['🛒','✈️','🎓','🛡️','🏠','🚗','💊','🎮','👕','☕','🎵','💪','🐾','🎁','📚','💡'];
const BUDGET_COLORS = ['#F59E0B','#3B82F6','#8B5CF6','#059669','#EF4444','#EC4899','#F97316','#0D9488'];

function AddBudgetModal({ onClose, T, existing }) {
  const [type, setType]       = React.useState(existing?.type || 'budget');
  const [icon, setIcon]       = React.useState(existing?.icon || '🛒');
  const [name, setName]       = React.useState(existing?.name || '');
  const [colorIdx, setColorIdx] = React.useState(BUDGET_COLORS.indexOf(existing?.color) >= 0 ? BUDGET_COLORS.indexOf(existing.color) : 0);
  const [monthly, setMonthly] = React.useState(existing?.monthly ? String(existing.monthly) : '');
  const [target, setTarget]   = React.useState(existing?.target ? String(existing.target) : '');
  const [saved, setSaved]     = React.useState(existing?.saved ? String(existing.saved) : '0');
  const [saving, setSaving]   = React.useState(false);
  const isSaving = type === 'saving';

  const handleSave = async () => {
    if (!name.trim()) return;
    if (isSaving && !target) return;
    if (!isSaving && !monthly) return;
    setSaving(true);
    const user = firebase.auth().currentUser;
    const db = firebase.firestore();
    const data = {
      name: name.trim(), icon, color: BUDGET_COLORS[colorIdx], type: isSaving ? 'saving' : undefined,
      ...(isSaving
        ? { target: parseFloat(target), saved: parseFloat(saved) || 0 }
        : { monthly: parseFloat(monthly), spent: existing?.spent || 0 })
    };
    if (!isSaving) delete data.type;
    if (existing?.id) await db.collection(`users/${user.uid}/budgets`).doc(existing.id).update(data);
    else await db.collection(`users/${user.uid}/budgets`).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving(false); onClose();
  };

  return (
    <BottomSheet title={existing ? 'Modülü Düzenle' : 'Yeni Modül'} onClose={onClose} T={T}>
      <div style={{ marginBottom: 14 }}>
        <SegControl tabs={[['budget','💰 Bütçe'],['saving','🎯 Birikim']]} active={type} onChange={setType} T={T} />
      </div>

      {/* İkon seçici */}
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: T.fs(11), fontWeight: 600, color: T.textSub, marginBottom: 7, textTransform: 'uppercase', letterSpacing: '.05em' }}>İkon</div>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
          {BUDGET_ICONS.map(ic => (
            <button key={ic} onClick={() => setIcon(ic)}
              style={{ width: 40, height: 40, borderRadius: 10, border: `2px solid ${icon === ic ? T.primary : T.border}`, background: icon === ic ? T.primaryLight : T.surface2, cursor: 'pointer', fontSize: 20 }}>
              {ic}
            </button>
          ))}
        </div>
      </div>

      <FField label="Modül Adı" value={name} onChange={setName} placeholder={isSaving ? 'Tatil Birikimi' : 'Mutfak Bütçesi'} T={T} />

      {isSaving ? <>
        <FField label="Hedef Tutar (₺)" value={target} onChange={setTarget} type="number" inputMode="numeric" prefix="₺" placeholder="10000" T={T} />
        <FField label="Mevcut Birikim (₺)" value={saved} onChange={setSaved} type="number" inputMode="numeric" prefix="₺" placeholder="0" T={T} />
      </> :
        <FField label="Aylık Bütçe (₺)" value={monthly} onChange={setMonthly} type="number" inputMode="numeric" prefix="₺" placeholder="2000" T={T} />
      }

      {/* Renk seçici */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: T.fs(11), fontWeight: 600, color: T.textSub, marginBottom: 7, textTransform: 'uppercase', letterSpacing: '.05em' }}>Renk</div>
        <div style={{ display: 'flex', gap: 10 }}>
          {BUDGET_COLORS.map((c, i) => (
            <button key={i} onClick={() => setColorIdx(i)}
              style={{ width: 32, height: 32, borderRadius: '50%', background: c, border: colorIdx === i ? `3px solid ${T.text}` : '3px solid transparent', cursor: 'pointer' }} />
          ))}
        </div>
      </div>

      <SaveBtn onSave={handleSave} saving={saving} disabled={!name || (isSaving ? !target : !monthly)} T={T} label={existing ? 'Güncelle' : 'Modül Ekle'} />
    </BottomSheet>
  );
}

function AmountEntryModal({ title, confirmLabel, color, onConfirm, onClose, T }) {
  const [amount, setAmount] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const handleConfirm = async () => {
    const v = parseFloat(amount.replace(',', '.'));
    if (!v || v <= 0) return;
    setSaving(true);
    await onConfirm(v);
    setSaving(false);
    onClose();
  };
  return (
    <BottomSheet title={title} onClose={onClose} T={T}>
      <div style={{ position: 'relative', marginBottom: 14 }}>
        <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', fontFamily: "'DM Mono',monospace", fontSize: 20, color: T.textSub }}>₺</span>
        <input value={amount} onChange={e => setAmount(e.target.value)} type="number" inputMode="decimal" placeholder="0,00" autoFocus
          style={{ width: '100%', height: 56, border: `2px solid ${color}`, borderRadius: 12, padding: '0 14px 0 34px', fontFamily: "'DM Mono',monospace", fontSize: 22, fontWeight: 600, outline: 'none', boxShadow: `0 0 0 3px ${color}22`, background: T.surface, color: T.text }} />
      </div>
      <SaveBtn onSave={handleConfirm} saving={saving} disabled={!amount} T={T} label={confirmLabel} />
    </BottomSheet>
  );
}

function BudgetsScreen({ T }) {
  const [selId, setSelId]     = React.useState(null);
  const [showAdd, setShowAdd] = React.useState(false);
  const [editBudget, setEditBudget] = React.useState(null);
  const [amountModal, setAmountModal] = React.useState(null); // { budget, mode: 'add'|'subtract' }

  const user = firebase.auth().currentUser;
  const db   = firebase.firestore();

  const deleteBudget = async (id) => {
    if (!window.confirm('Bu modülü silmek istiyor musunuz?')) return;
    await db.collection(`users/${user.uid}/budgets`).doc(id).delete();
    setSelId(null);
  };

  const updateAmount = async (b, delta) => {
    const field = b.type === 'saving' ? 'saved' : 'spent';
    const newVal = Math.max(0, ((b[field] || 0) + delta));
    await db.collection(`users/${user.uid}/budgets`).doc(b.id).update({ [field]: newVal });
  };

  // Detail view
  const selBudget = selId ? DATA.budgets.find(b => b.id === selId) : null;
  if (selBudget) {
    const b = selBudget;
    const isSaving = b.type === 'saving';
    const current = isSaving ? (b.saved || 0) : (b.spent || 0);
    const limit   = isSaving ? (b.target || 1) : (b.monthly || 1);
    const val     = Math.min(100, Math.round(current / limit * 100));
    const barColor = isSaving ? (val >= 100 ? T.success : T.primary) : (val >= 90 ? T.danger : val >= 70 ? T.warning : T.primary);

    return <>
      <div style={{ padding: '12px 16px', background: T.surface, borderBottom: `1px solid ${T.border}`, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <button onClick={() => setSelId(null)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.primary, padding: 0, display: 'flex' }}>
            <svg width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
          </button>
          <span style={{ fontSize: T.fs(16), fontWeight: 700, color: T.text }}>{b.icon} {b.name}</span>
        </div>
        <div style={{ display: 'flex', gap: 6 }}>
          <button onClick={() => setEditBudget(b)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.textMut, padding: '4px' }}>
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button onClick={() => deleteBudget(b.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.danger, padding: '4px' }}>
            <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          </button>
        </div>
      </div>
      <Scroller>
        <Card T={T} style={{ padding: 20 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ fontSize: 44, marginBottom: 8 }}>{b.icon}</div>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(30), fontWeight: 700, color: b.color || T.primary }}>{fmt(current)}</div>
            <div style={{ fontSize: T.fs(13), color: T.textSub, marginTop: 4 }}>
              {isSaving ? `${fmt(limit)} hedefin` : `${fmt(limit)} bütçenin`} {isSaving ? 'birikti' : 'harcandı'}
            </div>
            <div style={{ marginTop: 16, marginBottom: 6 }}>
              <ProgressBar value={val} color={barColor} T={T} height={12} />
            </div>
            <div style={{ fontSize: T.fs(12), color: T.textSub }}>%{val} {isSaving ? 'tamamlandı' : 'kullanıldı'}</div>
          </div>
        </Card>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <Card T={T} style={{ padding: '14px 16px' }}>
            <div style={{ fontSize: T.fs(11), color: T.textSub, marginBottom: 4 }}>{isSaving ? 'Hedefe kalan' : 'Bu ay kalan'}</div>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(18), fontWeight: 700, color: T.success }}>{fmt(Math.max(0, limit - current))}</div>
          </Card>
          <Card T={T} style={{ padding: '14px 16px' }}>
            <div style={{ fontSize: T.fs(11), color: T.textSub, marginBottom: 4 }}>{isSaving ? 'Birikilen' : 'Harcanan'}</div>
            <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(18), fontWeight: 700, color: b.color || T.primary }}>{fmt(current)}</div>
          </Card>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <button onClick={() => setAmountModal({ budget: b, mode: 'add' })}
            style={{ height: 52, background: b.color || T.primary, color: '#fff', border: 'none', borderRadius: 12, fontFamily: "'DM Sans',sans-serif", fontSize: T.fs(14), fontWeight: 700, cursor: 'pointer' }}>
            {isSaving ? '+ Birikim Ekle' : '+ Harcama Ekle'}
          </button>
          {current > 0 && <button onClick={() => setAmountModal({ budget: b, mode: 'subtract' })}
            style={{ height: 52, background: T.surface2, color: T.text, border: `1.5px solid ${T.border}`, borderRadius: 12, fontFamily: "'DM Sans',sans-serif", fontSize: T.fs(14), fontWeight: 600, cursor: 'pointer' }}>
            {isSaving ? '− Geri Al' : '− Düzelt'}
          </button>}
        </div>
      </Scroller>

      {editBudget && <AddBudgetModal onClose={() => setEditBudget(null)} T={T} existing={editBudget} />}
      {amountModal && <AmountEntryModal
        title={amountModal.mode === 'add' ? (amountModal.budget.type === 'saving' ? 'Birikim Ekle' : 'Harcama Ekle') : 'Düzelt / Geri Al'}
        confirmLabel={amountModal.mode === 'add' ? 'Ekle' : 'Geri Al'}
        color={amountModal.mode === 'add' ? (amountModal.budget.color || T.primary) : T.warning}
        onConfirm={v => updateAmount(amountModal.budget, amountModal.mode === 'add' ? v : -v)}
        onClose={() => setAmountModal(null)} T={T} />}
    </>;
  }

  // Grid view
  return <>
    <div style={{ padding: '12px 16px', background: T.surface, borderBottom: `1px solid ${T.border}`, flexShrink: 0 }}>
      <div style={{ fontSize: T.fs(13), color: T.textSub }}>{DATA.budgets.length} aktif modül</div>
    </div>
    <Scroller>
      {DATA.budgets.length === 0 && (
        <div style={{ textAlign: 'center', padding: '40px 0', color: T.textSub }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📦</div>
          <div style={{ fontSize: T.fs(14), fontWeight: 600, color: T.text }}>Henüz modül yok</div>
          <div style={{ fontSize: T.fs(12), marginTop: 4 }}>Bütçe veya birikim hedefi oluşturun</div>
        </div>
      )}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        {DATA.budgets.map((b, i) => {
          const isSaving = b.type === 'saving';
          const current = isSaving ? (b.saved || 0) : (b.spent || 0);
          const limit   = isSaving ? (b.target || 1) : (b.monthly || 1);
          const val     = Math.min(100, Math.round(current / limit * 100));
          const alertColor = isSaving ? (val >= 100 ? T.success : b.color || T.primary) : (val >= 90 ? T.danger : val >= 70 ? T.warning : b.color || T.primary);
          return (
            <button key={b.id || i} onClick={() => setSelId(b.id)}
              style={{ background: T.surface, borderRadius: 14, border: `1px solid ${T.border}`, padding: '14px 14px', textAlign: 'left', cursor: 'pointer', boxShadow: T.cardShadow }}>
              <div style={{ fontSize: 28, marginBottom: 8 }}>{b.icon}</div>
              <div style={{ fontSize: T.fs(12), fontWeight: 700, color: T.text, marginBottom: 4 }}>{b.name}</div>
              <div style={{ fontFamily: "'DM Mono',monospace", fontSize: T.fs(13), fontWeight: 600, color: alertColor }}>{isSaving ? fmtK(current) : fmt(current)}</div>
              <div style={{ fontSize: T.fs(10), color: T.textSub, marginBottom: 6 }}>{isSaving ? `/ ${fmtK(limit)} hedef` : `/ ${fmtK(limit)} bütçe`}</div>
              <ProgressBar value={val} color={alertColor} T={T} height={5} />
              <div style={{ fontSize: T.fs(10), color: T.textMut, marginTop: 4 }}>%{val}</div>
            </button>
          );
        })}
      </div>
      <button onClick={() => setShowAdd(true)}
        style={{ width: '100%', padding: '13px 0', borderRadius: 12, background: T.primaryLight, border: `1.5px dashed ${T.primary}`, color: T.primary, fontFamily: "'DM Sans',sans-serif", fontSize: T.fs(13), fontWeight: 700, cursor: 'pointer' }}>
        + Yeni Modül Ekle
      </button>
    </Scroller>
    {showAdd && <AddBudgetModal onClose={() => setShowAdd(false)} T={T} />}
  </>;
}

        <button onClick={saveName} disabled={savingName} style={{ height: 40, padding: '0 16px', background: T.primary, color: '#fff', border: 'none', borderRadius: 8, fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 13, cursor: 'pointer' }}>
          {savingName ? '…' : 'Kaydet'}
        </button>
      </div>
    </Card>}

    {/* Font size picker */}
    <div>
      <div style={{ fontSize: T.fs(11), fontWeight: 700, color: T.textMut, textTransform: 'uppercase', letterSpacing: '.07em', margin: '4px 4px 6px' }}>Yazı Boyutu</div>
      <Card T={T} style={{ padding: '16px 14px' }}>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'space-between' }}>
          {FONT_SCALES.map(opt => {
            const active = fontScaleKey === opt.key;
            return (
              <button key={opt.key} onClick={() => onFontScale(opt.key, opt.scale)}
                style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, background: active ? T.primaryLight : T.surface2, border: `2px solid ${active ? T.primary : 'transparent'}`, borderRadius: 12, padding: '10px 4px', cursor: 'pointer' }}>
                <span style={{ fontSize: Math.round(16 * opt.scale), fontWeight: 700, color: active ? T.primary : T.text, lineHeight: 1 }}>Aa</span>
                <span style={{ fontSize: 10, fontWeight: 700, color: active ? T.primary : T.textSub }}>{opt.label}</span>
                <span style={{ fontSize: 9, color: active ? T.primary : T.textMut, fontWeight: 500 }}>{opt.name}</span>
              </button>
            );
          })}
        </div>
        <div style={{ marginTop: 12, padding: '10px 12px', background: T.surface2, borderRadius: 8 }}>
          <span style={{ fontSize: T.fs(13), color: T.text, fontWeight: 500 }}>Örnek metin: </span>
          <span style={{ fontSize: T.fs(13), color: T.textSub }}>Gelir, gider ve bakiye takibi.</span>
        </div>
      </Card>
    </div>

    {/* Accent colour picker */}
    <div>
      <div style={{ fontSize: T.fs(11), fontWeight: 700, color: T.textMut, textTransform: 'uppercase', letterSpacing: '.07em', margin: '4px 4px 6px' }}>Vurgu Rengi</div>
      <Card T={T} style={{ padding: '14px 14px' }}>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, justifyContent: 'center', alignItems: 'center' }}>
          {ACCENT_META.map((a) => {
            const active = accent === a.key;
            return (
              <button key={a.key} onClick={() => onAccent(a.key)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
                <div style={{ width: 40, height: 40, borderRadius: '50%', background: a.color, boxShadow: active ? `0 0 0 3px ${T.surface}, 0 0 0 5px ${a.color}` : 'none', transition: 'box-shadow .2s', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  {active && <svg width="18" height="18" fill="none" stroke="#fff" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12" /></svg>}
                </div>
                <span style={{ fontSize: 10, fontWeight: 600, color: active ? a.color : T.textSub }}>{a.label}</span>
              </button>
            );
          })}
        </div>
      </Card>
    </div>

    {sections.map((sec, si) =>
    <div key={si}>
        <div style={{ fontSize: T.fs(11), fontWeight: 700, color: T.textMut, textTransform: 'uppercase', letterSpacing: '.07em', margin: '4px 4px 6px' }}>{sec.title}</div>
        <Card T={T} style={{ padding: '0 4px' }}>
          {sec.items.map((item, ii) =>
        <button key={ii} onClick={item.onTap} style={{ width: '100%', display: 'flex', alignItems: 'center', gap: 12, padding: '14px 12px', borderBottom: ii < sec.items.length - 1 ? `1px solid ${T.border}` : 'none', background: 'none', border: 'none', cursor: item.onTap ? 'pointer' : 'default', borderRadius: 0, textAlign: 'left' }}>
              <span style={{ fontSize: T.fs(20), width: 30, textAlign: 'center' }}>{item.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: T.fs(14), fontWeight: 600, color: item.danger ? T.danger : item.accent ? T.primary : T.text }}>{item.label}</div>
                {item.sub && <div style={{ fontSize: T.fs(12), color: T.textSub, marginTop: 2 }}>{item.sub}</div>}
              </div>
              {!item.danger && item.onTap && <svg width={T.fs(16)} height={T.fs(16)} fill="none" stroke={T.textMut} strokeWidth="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" /></svg>}
            </button>
        )}
        </Card>
      </div>
    )}
  </Scroller>;
}

// ─── KART / KREDİ MODALLARI ───────────────────────────────────────────────────
function AddCardModal({ onClose, T, existing }) {
  const [name, setName]       = React.useState(existing?.name || '');
  const [limit, setLimit]     = React.useState(existing?.limit ? String(existing.limit) : '');
  const [balance, setBalance] = React.useState(existing?.balance ? String(existing.balance) : '');
  const [dueDay, setDueDay]   = React.useState(existing?.dueDay ? String(existing.dueDay) : existing?.due ? existing.due.split('.')[0] : '');
  const CARD_COLORS = ['#7C3AED','#1E3A5F','#059669','#DC2626','#F97316','#0D9488'];
  const [colorIdx, setColorIdx] = React.useState(CARD_COLORS.indexOf(existing?.color) >= 0 ? CARD_COLORS.indexOf(existing.color) : 0);
  const [saving, setSaving] = React.useState(false);

  const computeDue = (day) => {
    if (!day) return '';
    const d = parseInt(day); const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth(), d);
    if (target < now) target.setMonth(target.getMonth() + 1);
    return `${String(d).padStart(2,'0')}.${String(target.getMonth()+1).padStart(2,'0')}`;
  };

  const handleSave = async () => {
    if (!name.trim() || !limit) return;
    setSaving(true);
    const user = firebase.auth().currentUser;
    const db = firebase.firestore();
    const data = { name: name.trim(), limit: parseFloat(limit), balance: parseFloat(balance)||0, due: computeDue(dueDay), dueDay: parseInt(dueDay)||0, color: CARD_COLORS[colorIdx] };
    if (existing?.id) await db.collection(`users/${user.uid}/cards`).doc(existing.id).update(data);
    else await db.collection(`users/${user.uid}/cards`).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving(false); onClose();
  };

  return (
    <BottomSheet title={existing ? 'Kartı Düzenle' : 'Yeni Kart Ekle'} onClose={onClose} T={T}>
      <FField label="Kart Adı" value={name} onChange={setName} placeholder="Garanti BBVA" T={T} />
      <FField label="Limit (₺)" value={limit} onChange={setLimit} type="number" inputMode="numeric" placeholder="15000" prefix="₺" T={T} />
      <FField label="Mevcut Borç (₺)" value={balance} onChange={setBalance} type="number" inputMode="numeric" placeholder="4250" prefix="₺" T={T} />
      <FField label="Son Ödeme Günü (1-31)" value={dueDay} onChange={setDueDay} type="number" inputMode="numeric" placeholder="27" T={T} />
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.textSub, marginBottom: 8, textTransform: 'uppercase', letterSpacing: '.05em' }}>Kart Rengi</div>
        <div style={{ display: 'flex', gap: 10 }}>
          {CARD_COLORS.map((c, i) => <button key={i} onClick={() => setColorIdx(i)} style={{ width: 32, height: 32, borderRadius: '50%', background: c, border: colorIdx === i ? `3px solid ${T.text}` : '3px solid transparent', cursor: 'pointer' }} />)}
        </div>
      </div>
      <SaveBtn onSave={handleSave} saving={saving} disabled={!name || !limit} T={T} label={existing ? 'Güncelle' : 'Kartı Ekle'} />
    </BottomSheet>
  );
}

function AddLoanModal({ onClose, T, existing }) {
  const [name, setName]         = React.useState(existing?.name || '');
  const [bank, setBank]         = React.useState(existing?.bank || '');
  const [monthly, setMonthly]   = React.useState(existing?.monthly ? String(existing.monthly) : '');
  const [instTotal, setInstTotal] = React.useState(existing?.installments ? String(existing.installments) : '');
  const [instLeft, setInstLeft] = React.useState(existing?.remaining_count ? String(existing.remaining_count) : '');
  const [dueDay, setDueDay]     = React.useState(existing?.dueDay ? String(existing.dueDay) : '');
  const [saving, setSaving]     = React.useState(false);

  const handleSave = async () => {
    if (!name.trim() || !monthly || !instLeft) return;
    setSaving(true);
    const user = firebase.auth().currentUser;
    const db   = firebase.firestore();
    const m = parseFloat(monthly), rc = parseInt(instLeft)||0, it = parseInt(instTotal)||0;
    const data = {
      name: name.trim(), bank: bank.trim(),
      monthly: m, installments: it, remaining_count: rc,
      remaining: m * rc, totalPaid: m * (it - rc),
      dueDay: parseInt(dueDay)||0,
    };
    if (existing?.id) await db.collection(`users/${user.uid}/loans`).doc(existing.id).update(data);
    else await db.collection(`users/${user.uid}/loans`).add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    setSaving(false); onClose();
  };

  const preview = monthly && instLeft
    ? `Kalan borç: ${fmt(parseFloat(monthly||0) * parseInt(instLeft||0))}`
    : null;

  return (
    <BottomSheet title={existing ? 'Krediyi Düzenle' : 'Yeni Kredi Ekle'} onClose={onClose} T={T}>
      <FField label="Kredi Adı" value={name} onChange={setName} placeholder="Konut Kredisi" T={T} />
      <FField label="Banka" value={bank} onChange={setBank} placeholder="Ziraat Bankası" T={T} />
      <FField label="Taksit Tutarı (₺)" value={monthly} onChange={setMonthly} type="number" inputMode="numeric" placeholder="3200" prefix="₺" T={T} />
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
        <FField label="Toplam Taksit" value={instTotal} onChange={setInstTotal} type="number" inputMode="numeric" placeholder="60" T={T} />
        <FField label="Kalan Taksit" value={instLeft} onChange={setInstLeft} type="number" inputMode="numeric" placeholder="48" T={T} />
      </div>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.textSub, marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>Aylık Taksit Ödeme Tarihi</div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <div style={{ flex: 1, position: 'relative' }}>
            <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: T.textSub, fontSize: 13, fontWeight: 500, whiteSpace: 'nowrap' }}>Her ayın</span>
            <input value={dueDay} onChange={e => setDueDay(e.target.value)} type="number" inputMode="numeric" min="1" max="31" placeholder="—"
              style={{ width: '100%', height: 44, border: `1.5px solid ${dueDay ? T.primary : T.border}`, borderRadius: 10, padding: '0 44px 0 90px', fontSize: 16, fontWeight: 700, outline: 'none', background: T.surface, color: T.text, fontFamily: "'DM Mono',monospace", textAlign: 'center' }} />
            <span style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', color: T.textSub, fontSize: 13, fontWeight: 500 }}>. günü</span>
          </div>
        </div>
        {dueDay && <div style={{ fontSize: 12, color: T.primary, fontWeight: 600, marginTop: 6 }}>📅 Her ay {dueDay}. günü ödeme yapılacak</div>}
        {!dueDay && <div style={{ fontSize: 11, color: T.textMut, marginTop: 5 }}>Boş bırakılabilir, sonradan düzenleyebilirsiniz</div>}
      </div>
      {preview && <div style={{ fontSize: 12, color: T.primary, fontWeight: 600, marginBottom: 8, padding: '8px 12px', background: T.primaryLight, borderRadius: 8 }}>{preview}</div>}
      <SaveBtn onSave={handleSave} saving={saving} disabled={!name || !monthly || !instLeft} T={T} label={existing ? 'Güncelle' : 'Krediyi Ekle'} />
    </BottomSheet>
  );
}

// ─── SABİT İŞLEMLER ───────────────────────────────────────────────────────────
function RecurringModal({ onClose, T }) {
  const [items, setItems] = React.useState([]);
  const [showAdd, setShowAdd] = React.useState(false);
  const [newLabel, setNewLabel]   = React.useState('');
  const [newAmount, setNewAmount] = React.useState('');
  const [newType, setNewType]     = React.useState('income');
  const [newCat, setNewCat]       = React.useState('Gelir');
  const [newDay, setNewDay]       = React.useState('1');
  const [newFreq, setNewFreq]     = React.useState('monthly');
  const todayIso = new Date().toISOString().slice(0,10);
  const [newDate, setNewDate]     = React.useState(todayIso);
  const [saving, setSaving]       = React.useState(false);

  const user = firebase.auth().currentUser;
  const db   = firebase.firestore();

  React.useEffect(() => {
    if (!user) return;
    return db.collection(`users/${user.uid}/recurring`).orderBy('createdAt', 'desc').onSnapshot(snap => {
      setItems(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }, []);

  const isPending = (item) => {
    const now = new Date();
    return !DATA.transactions.some(t => {
      const [dd, mm, yy] = t.date.split('.');
      const td = new Date(+yy, +mm-1, +dd);
      return td.getMonth() === now.getMonth() && td.getFullYear() === now.getFullYear()
        && t.label === item.label && Math.abs(t.amount) === Math.abs(item.amount);
    });
  };

  const addTx = async (item) => {
    const today = new Date().toLocaleDateString('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\//g,'.');
    await db.collection(`users/${user.uid}/transactions`).add({
      label: item.label, cat: item.cat, catColor: item.catColor,
      amount: item.amount, date: today,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
  };

  const addAllPending = async () => {
    const pending = items.filter(isPending);
    for (const item of pending) await addTx(item);
    onClose();
  };

  const deleteItem = async (id) => {
    await db.collection(`users/${user.uid}/recurring`).doc(id).delete();
  };

  const isoToTr = (iso) => {
    const [y,m,d] = iso.split('-');
    return `${d}.${m}.${y}`;
  };

  const handleAdd = async () => {
    if (!newLabel.trim() || !newAmount) return;
    setSaving(true);
    const amt = parseFloat(newAmount);
    const entry = {
      label: newLabel.trim(),
      amount: newType === 'income' ? amt : -amt,
      cat: newType === 'income' ? 'Gelir' : newCat,
      catColor: newType === 'income' ? '#059669' : (CAT_COLORS[newCat] || '#9CA3AF'),
      frequency: newFreq,
      dayOfMonth: newFreq === 'once' ? parseInt(newDate.split('-')[2]) : (parseInt(newDay)||1),
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    if (newFreq === 'once') {
      // Tek seferlik → direkt işlem olarak ekle
      await db.collection(`users/${user.uid}/transactions`).add({
        label: entry.label, cat: entry.cat, catColor: entry.catColor,
        amount: entry.amount, date: isoToTr(newDate),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await db.collection(`users/${user.uid}/recurring`).add(entry);
    }
    setNewLabel(''); setNewAmount(''); setShowAdd(false); setSaving(false);
  };

  const pending = items.filter(isPending);
  const CATS = ['Mutfak','Ulaşım','Sağlık','Giyim','Ev Giderleri','Abonelik','Birikim','Diğer'];

  return (
    <BottomSheet title="🔁 Sabit İşlemler" onClose={onClose} T={T}>
      {pending.length > 0 && (
        <div style={{ background: T.primaryLight, borderRadius: 10, padding: '10px 12px', marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: T.primary }}>{pending.length} işlem bu ay bekliyor</span>
          <button onClick={addAllPending} style={{ background: T.primary, color: '#fff', border: 'none', borderRadius: 8, padding: '6px 14px', fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 12, cursor: 'pointer' }}>Hepsini Ekle</button>
        </div>
      )}
      {items.length === 0 && !showAdd && (
        <div style={{ textAlign: 'center', padding: '20px 0', color: T.textSub }}>
          <div style={{ fontSize: 28, marginBottom: 8 }}>🔁</div>
          <div style={{ fontSize: 13 }}>Henüz sabit işlem yok</div>
          <div style={{ fontSize: 11, marginTop: 4 }}>Maaş, kira gibi tekrarlayan gelir/giderleri ekle</div>
        </div>
      )}
      {items.map(item => (
        <div key={item.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 0', borderBottom: `1px solid ${T.border}` }}>
          <div style={{ width: 36, height: 36, borderRadius: 10, background: (item.catColor || '#9CA3AF') + '20', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <div style={{ width: 10, height: 10, borderRadius: '50%', background: item.catColor || '#9CA3AF' }} />
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: T.text }}>{item.label}</div>
            <div style={{ fontSize: 11, color: T.textSub }}>{item.frequency === 'monthly' ? `Her ay ${item.dayOfMonth}. gün` : item.frequency === 'yearly' ? `Her yıl ${item.dayOfMonth}. gün` : 'Tek seferlik'}</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <MonoAmt value={Math.abs(item.amount)} type={item.amount > 0 ? 'income' : 'expense'} size={13} />
            {isPending(item) ? (
              <button onClick={() => addTx(item)} style={{ background: T.success, color: '#fff', border: 'none', borderRadius: 6, padding: '4px 10px', fontSize: 11, fontWeight: 700, cursor: 'pointer', fontFamily: "'DM Sans',sans-serif", whiteSpace: 'nowrap' }}>Ekle</button>
            ) : (
              <span style={{ fontSize: 11, color: T.success, fontWeight: 700 }}>✓ Eklendi</span>
            )}
            <button onClick={() => deleteItem(item.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.danger, padding: '2px 4px' }}>
              <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
            </button>
          </div>
        </div>
      ))}
      {showAdd ? (
        <div style={{ marginTop: 14, padding: '14px', background: T.surface2, borderRadius: 12 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 10 }}>Yeni Sabit İşlem</div>
          <SegControl tabs={[['income','Gelir'],['expense','Gider']]} active={newType} onChange={v => { setNewType(v); setNewCat(v === 'income' ? 'Gelir' : 'Mutfak'); }} T={T} />
          <div style={{ marginTop: 10 }}>
            <FField label="Açıklama" value={newLabel} onChange={setNewLabel} placeholder="Maaş" T={T} />
            <FField label="Tutar (₺)" value={newAmount} onChange={setNewAmount} type="number" inputMode="numeric" prefix="₺" placeholder="10000" T={T} />
            {newType === 'expense' && <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: T.textSub, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Kategori</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                {CATS.map(c => <Pill key={c} label={c} active={newCat === c} onClick={() => setNewCat(c)} T={T} />)}
              </div>
            </div>}
            <div style={{ marginBottom: 12 }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: T.textSub, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Sıklık</div>
              <div style={{ display: 'flex', background: T.surface2, borderRadius: 10, padding: 3, gap: 2 }}>
                {[['monthly','Aylık'],['yearly','Yıllık'],['once','Tek Seferlik']].map(([id,lbl]) =>
                  <button key={id} onClick={() => setNewFreq(id)} style={{ flex:1, padding:'7px 0', borderRadius:8, fontFamily:"'DM Sans',sans-serif", fontSize:12, fontWeight:600, border:'none', cursor:'pointer', background: newFreq===id ? T.surface : 'transparent', color: newFreq===id ? T.primary : T.textSub, boxShadow: newFreq===id ? T.cardShadow : 'none', transition:'all .15s' }}>{lbl}</button>
                )}
              </div>
            </div>
            {newFreq === 'once' ? (
              <div style={{ marginBottom: 12 }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: T.textSub, marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>İşlem Tarihi</div>
                <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)}
                  style={{ width:'100%', height:44, border:`1.5px solid ${T.border}`, borderRadius:10, padding:'0 14px', fontSize:14, outline:'none', background:T.surface, color:T.text, fontFamily:"'DM Sans',sans-serif" }} />
              </div>
            ) : (
              <FField label={newFreq === 'yearly' ? 'Hangi Ay Günü' : 'Her Ayın Kaçında'} value={newDay} onChange={setNewDay} type="number" inputMode="numeric" placeholder="1" T={T} />
            )}
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setShowAdd(false)} style={{ flex: 1, height: 44, background: T.surface2, color: T.text, border: `1px solid ${T.border}`, borderRadius: 10, fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 14, cursor: 'pointer' }}>İptal</button>
              <button onClick={handleAdd} disabled={saving || !newLabel || !newAmount} style={{ flex: 2, height: 44, background: saving || !newLabel || !newAmount ? T.textMut : T.primary, color: '#fff', border: 'none', borderRadius: 10, fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 14, cursor: saving || !newLabel || !newAmount ? 'default' : 'pointer' }}>
                {saving ? 'Kaydediliyor…' : 'Ekle'}
              </button>
            </div>
          </div>
        </div>
      ) : (
        <button onClick={() => setShowAdd(true)} style={{ width: '100%', padding: '12px 0', borderRadius: 12, background: T.primaryLight, border: `1.5px dashed ${T.primary}`, color: T.primary, fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600, cursor: 'pointer', marginTop: 12 }}>+ Sabit İşlem Ekle</button>
      )}
    </BottomSheet>
  );
}

// ─── AUTH SCREENS ─────────────────────────────────────────────────────────────
function AuthInput({ label, value, onChange, type = 'text', placeholder }) {
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 600, color: '#6B7280', marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>{label}</div>
      <input value={value} onChange={e => onChange(e.target.value)} type={type} placeholder={placeholder}
        onKeyDown={e => e.key === 'Enter' && e.target.closest('form')?.querySelector('[data-submit]')?.click()}
        style={{ width: '100%', height: 46, border: `1.5px solid ${focus ? '#7C3AED' : '#E5E7EB'}`, borderRadius: 10, padding: '0 14px', fontSize: 14, outline: 'none', fontFamily: "'DM Sans',sans-serif", color: '#111827', background: '#fff', transition: 'border-color .15s' }}
        onFocus={() => setFocus(true)} onBlur={() => setFocus(false)} />
    </div>
  );
}

const AUTH_ERRORS = {
  'auth/user-not-found': 'Bu e-posta ile kayıtlı hesap bulunamadı',
  'auth/wrong-password': 'Şifre yanlış',
  'auth/invalid-credential': 'E-posta veya şifre hatalı',
  'auth/invalid-email': 'Geçersiz e-posta adresi',
  'auth/email-already-in-use': 'Bu e-posta zaten kullanımda',
  'auth/weak-password': 'Şifre en az 6 karakter olmalı',
  'auth/too-many-requests': 'Çok fazla deneme. Lütfen bekleyin',
};

function LoginScreen({ onGoRegister }) {
  const [email, setEmail] = React.useState('');
  const [pw, setPw] = React.useState('');

function RegisterScreen({ onGoLogin }) {
  const [name, setName]           = React.useState('');
  const [email, setEmail]         = React.useState('');
  const [pw, setPw]               = React.useState('');
  const [inviteCode, setInviteCode] = React.useState('');
  const [err, setErr]             = React.useState('');
  const [loading, setLoading]     = React.useState(false);

  const handleRegister = async () => {
    if (!name.trim() || !email || !pw || !inviteCode.trim()) {
      setErr('Tüm alanlar ve davet kodu zorunludur'); return;
    }
    setLoading(true); setErr('');
    try {
      // Davet kodunu Firestore'dan kontrol et
      const cfgDoc = await firebase.firestore().doc('config/registration').get();
      if (!cfgDoc.exists) {
        setErr('Kayıt şu an kapalı. Yönetici ile iletişime geçin.'); setLoading(false); return;
      }
      const validCode = (cfgDoc.data().inviteCode || '').trim();
      if (!validCode || inviteCode.trim() !== validCode) {
        setErr('Geçersiz davet kodu. Yöneticinizden doğru kodu alın.'); setLoading(false); return;
      }
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, pw);
      await cred.user.updateProfile({ displayName: name.trim() });
      await seedUserData(cred.user.uid, name.trim());
    } catch (e) { setErr(AUTH_ERRORS[e.code] || 'Kayıt başarısız, tekrar deneyin'); }
    setLoading(false);
  };

  return (
    <div style={{ position: 'fixed', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', background: '#F5F3FF', padding: 24, fontFamily: "'DM Sans',sans-serif", overflowY: 'auto' }}>
      <div style={{ marginBottom: 24, textAlign: 'center' }}>
        <div style={{ fontWeight: 800, fontSize: 36, color: '#7C3AED', letterSpacing: '-.03em' }}>Para<span style={{ color: '#059669' }}>Cep</span></div>
      </div>
      <form onSubmit={e => { e.preventDefault(); handleRegister(); }} style={{ width: '100%', maxWidth: 360, background: '#fff', borderRadius: 20, padding: 24, boxShadow: '0 4px 32px rgba(124,58,237,.13)' }}>
        <div style={{ fontSize: 18, fontWeight: 700, color: '#111827', marginBottom: 18 }}>Hesap Oluştur</div>
        {err && <div style={{ background: '#FEF2F2', border: '1px solid #FECACA', borderRadius: 8, padding: '10px 12px', fontSize: 13, color: '#DC2626', marginBottom: 14 }}>{err}</div>}
        <AuthInput label="Ad Soyad" value={name} onChange={setName} placeholder="Adınız" />
        <AuthInput label="E-posta" value={email} onChange={setEmail} type="email" placeholder="ornek@email.com" />
        <AuthInput label="Şifre" value={pw} onChange={setPw} type="password" placeholder="En az 6 karakter" />
        <div style={{ marginBottom: 12 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: '#6B7280', marginBottom: 5, textTransform: 'uppercase', letterSpacing: '.05em' }}>Davet Kodu</div>
          <div style={{ position: 'relative' }}>
            <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', fontSize: 16 }}>🔑</span>
            <input value={inviteCode} onChange={e => setInviteCode(e.target.value)} type="text" placeholder="Yöneticinizden alın"
              style={{ width: '100%', height: 46, border: '1.5px solid #E5E7EB', borderRadius: 10, padding: '0 14px 0 36px', fontSize: 14, outline: 'none', fontFamily: "'DM Sans',sans-serif", color: '#111827', letterSpacing: '.08em', fontWeight: 600 }}
              onFocus={e => e.target.style.borderColor = '#7C3AED'}
              onBlur={e => e.target.style.borderColor = '#E5E7EB'} />
          </div>
        </div>
        <button data-submit type="submit" disabled={loading} style={{ width: '100%', height: 48, background: loading ? '#A78BFA' : '#7C3AED', color: '#fff', border: 'none', borderRadius: 12, fontFamily: "'DM Sans',sans-serif", fontSize: 15, fontWeight: 700, cursor: loading ? 'default' : 'pointer', marginTop: 6 }}>
          {loading ? 'Hesap oluşturuluyor…' : 'Kayıt Ol'}
        </button>
        <div style={{ textAlign: 'center', marginTop: 16, fontSize: 13, color: '#6B7280' }}>
          Hesabın var mı?{' '}
          <button type="button" onClick={onGoLogin} style={{ background: 'none', border: 'none', color: '#7C3AED', fontWeight: 700, cursor: 'pointer', fontFamily: "'DM Sans',sans-serif", fontSize: 13 }}>Giriş Yap →</button>
        </div>
      </form>
    </div>
  );
}

function QuickAddModal({ onClose, onSave, T }) {
  const [type, setType] = React.useState('expense');
  const [amount, setAmount] = React.useState('');
  const [label, setLabel] = React.useState('');
  const [cat, setCat] = React.useState('Mutfak');

  const CATS = ['Mutfak', 'Ulaşım', 'Sağlık', 'Giyim', 'Ev Giderleri', 'Gelir', 'Abonelik', 'Birikim', 'Diğer'];

  const today = new Date().toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' }).replace(/\//g, '.');

  const handleSave = async () => {
    const amt = parseFloat(amount.replace(',', '.'));

    setSaving(true);

        <div style={{ width: 36, height: 4, background: T.border, borderRadius: 2, margin: '12px auto 0' }} />

          <SegControl tabs={[['expense', 'Gider'], ['income', 'Gelir']]} active={type} onChange={v => { setType(v); if (v === 'income') setCat('Gelir'); else setCat('Mutfak'); }} T={T} />
        </div>
        <div style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: T.textSub, marginBottom: 6, textTransform: 'uppercase', letterSpacing: '.05em' }}>Tutar</div>
          <div style={{ position: 'relative' }}>
            <span style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', fontFamily: "'DM Mono',monospace", fontSize: 18, color: T.textSub }}>₺</span>
            <input value={amount} onChange={e => setAmount(e.target.value)} placeholder="0,00" type="number" inputMode="decimal"

          <input value={label} onChange={e => setLabel(e.target.value)} placeholder={cat}

        </div>
        {type === 'expense' && <div style={{ marginTop: 13 }}>
